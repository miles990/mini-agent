<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Collaborative Task Board</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Noto+Sans+TC:wght@300;400;500;600&family=Noto+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<style>
:root{--bg:#08090a;--surface:#111214;--surface2:#181a1e;--surface3:#1e2025;--border:#262830;--border-subtle:#1c1e24;--border-hover:#363a45;--text:#d4d4d8;--text-bright:#f0f0f2;--text2:#6b6f7b;--text3:#454854;--accent:#5eead4;--accent-dim:rgba(94,234,212,.12);--accent-glow:rgba(94,234,212,.06);--blue:#60a5fa;--blue-dim:rgba(96,165,250,.12);--yellow:#fbbf24;--yellow-dim:rgba(251,191,36,.10);--red:#f87171;--red-dim:rgba(248,113,113,.10);--purple:#a78bfa;--purple-dim:rgba(167,139,250,.10);--orange:#fb923c;--orange-dim:rgba(251,147,60,.10);--green:#4ade80;--green-dim:rgba(74,222,128,.10);--mono:'JetBrains Mono','SF Mono',monospace;--sans:'Noto Sans TC','Noto Sans',system-ui,sans-serif;--radius:8px;--radius-sm:5px;--col-gap:12px}
*{margin:0;padding:0;box-sizing:border-box}html,body{height:100%;overflow:hidden}
body{font-family:var(--sans);background:var(--bg);color:var(--text);font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased;display:flex;flex-direction:column}
body::before{content:'';position:fixed;inset:0;z-index:9999;pointer-events:none;opacity:.015;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:256px 256px}
.header{padding:10px 20px;border-bottom:1px solid var(--border-subtle);display:flex;align-items:center;gap:10px;background:var(--surface);flex-shrink:0;z-index:10}
.header-title{font-family:var(--mono);font-size:14px;font-weight:600;color:var(--accent);letter-spacing:-.02em}
.header-title span{color:var(--text3);font-weight:300}
.conn-dot{width:7px;height:7px;border-radius:50%;background:var(--text3);transition:all .5s;flex-shrink:0}
.conn-dot.ok{background:var(--accent);box-shadow:0 0 8px var(--accent-dim)}
.conn-dot.error{background:var(--red);box-shadow:0 0 8px var(--red-dim)}
.conn-label{font-family:var(--mono);font-size:10px;color:var(--text3)}
.header-spacer{flex:1}
.progress-bar{width:120px;height:4px;background:var(--surface3);border-radius:2px;overflow:hidden;flex-shrink:0}
.progress-fill{height:100%;border-radius:2px;transition:width .5s ease;background:linear-gradient(90deg,var(--accent),var(--green))}
.progress-label{font-family:var(--mono);font-size:10px;color:var(--text3);flex-shrink:0}
.header-stats{display:flex;gap:12px;font-family:var(--mono);font-size:10px;color:var(--text2);flex-shrink:0}
.header-stats .sv{color:var(--text-bright);font-weight:500}
.header-stats .s-pending .sv{color:var(--blue)}.header-stats .s-active .sv{color:var(--yellow)}.header-stats .s-done .sv{color:var(--green)}
.view-toggle{display:flex;gap:2px;background:var(--surface2);border-radius:var(--radius-sm);padding:2px;flex-shrink:0}
.view-btn{font-family:var(--mono);font-size:10px;color:var(--text3);background:none;border:none;padding:4px 10px;border-radius:3px;cursor:pointer;transition:all .15s;letter-spacing:.03em}
.view-btn:hover{color:var(--text2)}.view-btn.active{background:var(--surface3);color:var(--text)}
.header-btn{font-family:var(--mono);font-size:10px;color:var(--text3);background:none;border:1px solid var(--border);padding:4px 10px;border-radius:3px;cursor:pointer;transition:all .15s;flex-shrink:0}
.header-btn:hover{color:var(--text);border-color:var(--border-hover)}
.filter-bar{padding:8px 20px;border-bottom:1px solid var(--border-subtle);display:flex;align-items:center;gap:8px;background:var(--surface);flex-shrink:0}
.search-box{position:relative;flex-shrink:0}
.search-box input{width:200px;padding:5px 10px 5px 28px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:var(--sans);font-size:12px;outline:none;transition:all .2s}
.search-box input:focus{border-color:var(--accent);width:280px}
.search-box input::placeholder{color:var(--text3)}
.search-box .si{position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:12px;color:var(--text3);pointer-events:none}
.search-box .sh{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-family:var(--mono);font-size:9px;color:var(--text3);background:var(--surface3);padding:1px 5px;border-radius:3px;pointer-events:none;transition:opacity .15s}
.search-box input:focus+.si+.sh,.search-box input:not(:placeholder-shown)+.si+.sh{opacity:0}
.filter-sep{width:1px;height:18px;background:var(--border);flex-shrink:0}
.filter-group{display:flex;gap:3px;flex-shrink:0}
.filter-group-label{font-family:var(--mono);font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;align-self:center;margin-right:2px}
.fc{font-family:var(--mono);font-size:10px;color:var(--text3);background:none;border:1px solid transparent;padding:3px 8px;border-radius:12px;cursor:pointer;transition:all .15s;white-space:nowrap}
.fc:hover{color:var(--text2);background:var(--surface2)}.fc.active{color:var(--accent);border-color:rgba(94,234,212,.3);background:var(--accent-glow)}
.fc.a-orange{color:var(--orange);border-color:rgba(251,147,60,.3);background:var(--orange-dim)}
.fc.a-teal{color:var(--accent);border-color:rgba(94,234,212,.3);background:var(--accent-glow)}
.setup{padding:16px 20px;background:var(--surface);border-bottom:1px solid var(--border-subtle);flex-shrink:0}
.setup-grid{display:grid;grid-template-columns:1fr 1fr auto;gap:10px;align-items:end}
.setup label{display:block;font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:.05em;text-transform:uppercase;margin-bottom:4px}
.setup input{width:100%;padding:7px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:3px;color:var(--text);font-family:var(--mono);font-size:12px;outline:none;transition:border-color .2s}
.setup input:focus{border-color:var(--accent)}
.setup-btn{padding:7px 16px;background:var(--accent-dim);border:1px solid rgba(94,234,212,.25);border-radius:3px;color:var(--accent);font-family:var(--mono);font-size:11px;cursor:pointer;transition:all .15s;white-space:nowrap}
.setup-btn:hover{background:rgba(94,234,212,.18)}
.main{flex:1;display:flex;overflow:hidden}
.kanban{flex:1;display:grid;grid-template-columns:1fr 1fr 1fr;gap:var(--col-gap);padding:12px 16px;overflow:hidden}
.column{display:flex;flex-direction:column;min-height:0;background:var(--surface);border-radius:var(--radius);border:1px solid var(--border-subtle);overflow:hidden;transition:border-color .2s}
.column.drag-over{border-color:rgba(94,234,212,.4)}
.col-header{padding:10px 14px 8px;border-bottom:1px solid var(--border-subtle);display:flex;align-items:center;gap:8px;flex-shrink:0}
.col-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.col-dot.pending{background:var(--blue);box-shadow:0 0 6px var(--blue-dim)}
.col-dot.in_progress{background:var(--yellow);box-shadow:0 0 6px var(--yellow-dim)}
.col-dot.completed{background:var(--green);box-shadow:0 0 6px var(--green-dim)}
.col-title{font-family:var(--mono);font-size:11px;font-weight:500;color:var(--text2);letter-spacing:.04em;text-transform:uppercase}
.col-count{font-family:var(--mono);font-size:10px;color:var(--text3);margin-left:auto}
.col-body{flex:1;overflow-y:auto;padding:6px;display:flex;flex-direction:column;gap:4px}
.col-body::-webkit-scrollbar{width:4px}.col-body::-webkit-scrollbar-track{background:transparent}.col-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.column.drag-over .col-body{background:var(--accent-glow)}
.tc{background:var(--surface2);border:1px solid var(--border-subtle);border-radius:var(--radius-sm);padding:9px 11px;cursor:grab;transition:all .15s;position:relative}
.tc:hover{border-color:var(--border-hover);background:var(--surface3)}.tc:active{cursor:grabbing}.tc.dragging{opacity:.4;transform:scale(.97)}
.tc.new-card{animation:cardIn .25s ease-out}
@keyframes cardIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.card-top{display:flex;align-items:center;gap:5px;margin-bottom:4px}
.task-type{font-family:var(--mono);font-size:9px;letter-spacing:.06em;text-transform:uppercase}
.badge-task{color:var(--blue)}.badge-goal{color:var(--purple)}
.pb{font-family:var(--mono);font-size:9px;padding:1px 5px;border-radius:3px;font-weight:500}
.pb.p0{background:var(--red-dim);color:var(--red)}.pb.p1{background:var(--orange-dim);color:var(--orange)}.pb.p2{background:var(--surface3);color:var(--text3)}.pb.p3{background:var(--surface3);color:var(--text3);opacity:.6}
.ab{font-family:var(--mono);font-size:8px;padding:1px 5px;border-radius:3px;margin-left:auto;letter-spacing:.03em;text-transform:uppercase}
.ab.ah{background:var(--orange-dim);color:var(--orange)}.ab.aa{background:var(--accent-dim);color:var(--accent)}
.vd{display:flex;gap:3px;margin-left:4px}.vd span{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.vd .pass{background:var(--green)}.vd .fail{background:var(--red)}.vd .unknown{background:var(--text3)}
.task-title{font-size:12px;color:var(--text);line-height:1.4;word-break:break-word}
.task-meta{display:flex;align-items:center;gap:6px;margin-top:5px;font-family:var(--mono);font-size:9px;color:var(--text3);flex-wrap:wrap}
.task-origin{padding:1px 5px;background:var(--surface3);border-radius:3px}.task-time{opacity:.7}
.ta{position:absolute;top:5px;right:5px;display:flex;gap:2px;opacity:0;transition:opacity .15s}.tc:hover .ta{opacity:1}
.tab{width:20px;height:20px;border:none;background:var(--surface3);color:var(--text3);border-radius:3px;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;transition:all .1s}
.tab:hover{color:var(--text);background:var(--border)}.tab.delete:hover{color:var(--red);background:var(--red-dim)}
.atz{padding:5px 6px;flex-shrink:0;border-top:1px solid var(--border-subtle)}
.atb{width:100%;padding:5px;background:none;border:1px dashed var(--border);border-radius:var(--radius-sm);color:var(--text3);font-family:var(--mono);font-size:10px;cursor:pointer;transition:all .15s}
.atb:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-glow)}
.atf{display:none;flex-direction:column;gap:5px}.atf.active{display:flex}
.atf input{padding:6px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:3px;color:var(--text);font-size:12px;outline:none}.atf input:focus{border-color:var(--accent)}
.atf-row{display:flex;gap:4px;align-items:center}
.ps{display:flex;gap:2px}
.po{font-family:var(--mono);font-size:9px;padding:2px 5px;border:1px solid var(--border);border-radius:3px;background:none;color:var(--text3);cursor:pointer;transition:all .1s}
.po:hover{border-color:var(--border-hover);color:var(--text2)}.po.selected{border-color:var(--accent);color:var(--accent);background:var(--accent-glow)}
.tt{font-family:var(--mono);font-size:9px;padding:2px 6px;border:1px solid var(--border);border-radius:3px;background:none;color:var(--text3);cursor:pointer;transition:all .1s}
.tt:hover{border-color:var(--border-hover);color:var(--text2)}.tt.goal{color:var(--purple);border-color:rgba(167,139,250,.4)}
.fb{display:flex;gap:4px;margin-left:auto}
.bs{padding:3px 10px;border:none;border-radius:3px;background:var(--accent-dim);color:var(--accent);font-family:var(--mono);font-size:10px;cursor:pointer}.bs:hover{background:rgba(94,234,212,.2)}
.bc{padding:3px 10px;border:none;border-radius:3px;background:var(--surface3);color:var(--text3);font-family:var(--mono);font-size:10px;cursor:pointer}.bc:hover{color:var(--text)}
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;align-items:center;justify-content:center;backdrop-filter:blur(2px)}.mo.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);width:440px;max-width:90vw;max-height:80vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.5);animation:modalIn .2s ease-out}
@keyframes modalIn{from{opacity:0;transform:scale(.95) translateY(-10px)}to{opacity:1;transform:scale(1) translateY(0)}}
.mh{padding:14px 18px 10px;border-bottom:1px solid var(--border-subtle);display:flex;align-items:center;gap:8px}
.mht{font-family:var(--mono);font-size:12px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:.04em}
.mc{margin-left:auto;background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;padding:2px 6px;border-radius:3px}.mc:hover{color:var(--text);background:var(--surface3)}
.mb{padding:14px 18px;display:flex;flex-direction:column;gap:12px}
.mf{display:flex;flex-direction:column;gap:4px}
.ml{font-family:var(--mono);font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em}
.mi{padding:8px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:13px;outline:none}.mi:focus{border-color:var(--accent)}
.mr{display:flex;gap:10px}.mr .mf{flex:1}
.mfo{padding:10px 18px 14px;border-top:1px solid var(--border-subtle);display:flex;gap:8px;justify-content:flex-end}
.mbtn{padding:6px 16px;border:none;border-radius:var(--radius-sm);font-family:var(--mono);font-size:11px;cursor:pointer;transition:all .15s}
.mbtn-p{background:var(--accent-dim);color:var(--accent);border:1px solid rgba(94,234,212,.25)}.mbtn-p:hover{background:rgba(94,234,212,.2)}
.mbtn-s{background:var(--surface3);color:var(--text2)}.mbtn-s:hover{color:var(--text)}
.mbtn-d{background:var(--red-dim);color:var(--red);margin-right:auto}.mbtn-d:hover{background:rgba(248,113,113,.2)}
.ms{padding:6px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:var(--mono);font-size:12px;outline:none;cursor:pointer}.ms:focus{border-color:var(--accent)}
.dag-view{flex:1;display:none;padding:16px;overflow:auto}.dag-view.active{display:flex;flex-direction:column}
.dag-container{flex:1;display:flex;align-items:flex-start;justify-content:center;overflow:auto}.dag-svg{max-width:100%}
.dag-empty{color:var(--text3);font-family:var(--mono);font-size:12px;text-align:center;padding:60px 20px}
.dag-node rect{rx:6;ry:6;stroke-width:1.5;transition:all .2s;cursor:pointer}.dag-node rect:hover{stroke-width:2;filter:brightness(1.15)}
.dag-edge{stroke:var(--border-hover);stroke-width:1.5;fill:none;marker-end:url(#arrowhead)}
.ap{width:260px;border-left:1px solid var(--border-subtle);background:var(--surface);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;transition:width .2s}
.ap.collapsed{width:0;border:none;overflow:hidden}
.aph{padding:10px 12px 8px;border-bottom:1px solid var(--border-subtle);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.apt{font-family:var(--mono);font-size:11px;font-weight:500;color:var(--text2);letter-spacing:.04em;text-transform:uppercase}
.apc{background:none;border:none;color:var(--text3);font-family:var(--mono);font-size:9px;cursor:pointer}.apc:hover{color:var(--text2)}
.al{flex:1;overflow-y:auto;padding:6px}.al::-webkit-scrollbar{width:4px}.al::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.ai{padding:6px 8px;border-radius:var(--radius-sm);margin-bottom:3px;font-size:11px;line-height:1.4;color:var(--text2);animation:fadeSlide .3s ease}
.ai .at{font-family:var(--mono);font-size:9px;color:var(--text3);display:block;margin-bottom:1px}
.ai .aa2{font-weight:500}.ai .ah2{color:var(--orange)}.ai .ak2{color:var(--accent)}
@keyframes fadeSlide{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.col-empty{padding:16px 10px;text-align:center;font-family:var(--mono);font-size:11px;color:var(--text3);opacity:.5}
.kbd-toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:8px 16px;font-family:var(--mono);font-size:11px;color:var(--text2);z-index:200;display:flex;gap:16px;box-shadow:0 8px 30px rgba(0,0,0,.4);opacity:0;transition:opacity .3s;pointer-events:none}
.kbd-toast.show{opacity:1}.kbd-toast kbd{background:var(--surface3);border:1px solid var(--border);padding:1px 5px;border-radius:3px;font-size:10px;color:var(--accent)}
@media(max-width:900px){.kanban{grid-template-columns:1fr;gap:10px}.ap{display:none}.column{max-height:40vh}.filter-bar{flex-wrap:wrap}.search-box input{width:100%}.search-box input:focus{width:100%}.header-stats,.progress-bar,.progress-label{display:none}}
</style>
</head>
<body>
<div class="header">
  <div class="header-title">Task Board<span> ²</span></div>
  <div class="conn-dot" id="connDot"></div><div class="conn-label" id="connLabel">disconnected</div>
  <div class="header-spacer"></div>
  <div class="progress-label" id="progressLabel">0%</div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0"></div></div>
  <div class="header-stats">
    <span class="s-pending">pending <span class="sv" id="statPending">0</span></span>
    <span class="s-active">active <span class="sv" id="statActive">0</span></span>
    <span class="s-done">done <span class="sv" id="statDone">0</span></span>
  </div>
  <div class="view-toggle"><button class="view-btn active" data-view="kanban">KANBAN</button><button class="view-btn" data-view="dag">DAG</button></div>
  <button class="header-btn" id="btnActivity">activity</button>
  <button class="header-btn" id="btnSetup">setup</button>
</div>
<div class="filter-bar">
  <div class="search-box"><input type="text" id="searchInput" placeholder="Search tasks..."><span class="si">&#x1F50D;</span><span class="sh">/</span></div>
  <div class="filter-sep"></div>
  <div class="filter-group"><span class="filter-group-label">Priority</span><button class="fc active" data-fp="all">All</button><button class="fc" data-fp="0">P0</button><button class="fc" data-fp="1">P1</button><button class="fc" data-fp="2">P2</button></div>
  <div class="filter-sep"></div>
  <div class="filter-group"><span class="filter-group-label">Actor</span><button class="fc active" data-fa="all">All</button><button class="fc" data-fa="human">Human</button><button class="fc" data-fa="agent">Agent</button></div>
  <div class="filter-sep"></div>
  <div class="filter-group"><span class="filter-group-label">Type</span><button class="fc active" data-ft="all">All</button><button class="fc" data-ft="task">Task</button><button class="fc" data-ft="goal">Goal</button></div>
</div>
<div class="setup" id="setupPanel" style="display:none">
  <div class="setup-grid"><div><label>Server URL</label><input type="text" id="inputUrl" placeholder="http://localhost:3001"></div><div><label>API Key</label><input type="password" id="inputKey" placeholder="your-api-key"></div><button class="setup-btn" id="btnConnect">Connect</button></div>
</div>
<div class="main">
  <div class="kanban" id="kanbanView">
    <div class="column" data-status="pending">
      <div class="col-header"><div class="col-dot pending"></div><div class="col-title">Pending</div><div class="col-count" data-count="pending">0</div></div>
      <div class="col-body" id="colPending"></div>
      <div class="atz"><button class="atb" data-col="pending">+ New Task</button><div class="atf" data-col="pending"><input type="text" placeholder="Task title..." data-col="pending"><div class="atf-row"><div class="ps" data-col="pending"><button class="po" data-p="0">P0</button><button class="po" data-p="1">P1</button><button class="po selected" data-p="2">P2</button><button class="po" data-p="3">P3</button></div><button class="tt" data-col="pending" data-type="task">task</button><div class="fb"><button class="bs" data-col="pending">Save</button><button class="bc" data-col="pending">Cancel</button></div></div></div></div>
    </div>
    <div class="column" data-status="in_progress">
      <div class="col-header"><div class="col-dot in_progress"></div><div class="col-title">In Progress</div><div class="col-count" data-count="in_progress">0</div></div>
      <div class="col-body" id="colInProgress"></div>
      <div class="atz"><button class="atb" data-col="in_progress">+ New Task</button><div class="atf" data-col="in_progress"><input type="text" placeholder="Task title..." data-col="in_progress"><div class="atf-row"><div class="ps" data-col="in_progress"><button class="po" data-p="0">P0</button><button class="po" data-p="1">P1</button><button class="po selected" data-p="2">P2</button><button class="po" data-p="3">P3</button></div><button class="tt" data-col="in_progress" data-type="task">task</button><div class="fb"><button class="bs" data-col="in_progress">Save</button><button class="bc" data-col="in_progress">Cancel</button></div></div></div></div>
    </div>
    <div class="column" data-status="completed">
      <div class="col-header"><div class="col-dot completed"></div><div class="col-title">Completed</div><div class="col-count" data-count="completed">0</div></div>
      <div class="col-body" id="colCompleted"></div>
    </div>
  </div>
  <div class="dag-view" id="dagView"><div class="dag-container" id="dagContainer"><div class="dag-empty">No dependency graph available.<br>Tasks with refs will show connections here.</div></div></div>
  <div class="ap" id="activityPanel"><div class="aph"><div class="apt">Activity</div><button class="apc" id="btnClearActivity">clear</button></div><div class="al" id="activityList"></div></div>
</div>
<div class="mo" id="editModal">
  <div class="modal">
    <div class="mh"><span class="mht">Edit Task</span><button class="mc" id="modalClose">&times;</button></div>
    <div class="mb">
      <div class="mf"><label class="ml">Title</label><input class="mi" id="modalTitle" type="text" placeholder="Task title..."></div>
      <div class="mr">
        <div class="mf"><label class="ml">Priority</label><select class="ms" id="modalPriority"><option value="0">P0 — Critical</option><option value="1">P1 — High</option><option value="2" selected>P2 — Normal</option><option value="3">P3 — Low</option></select></div>
        <div class="mf"><label class="ml">Type</label><select class="ms" id="modalType"><option value="task">Task</option><option value="goal">Goal</option></select></div>
        <div class="mf"><label class="ml">Status</label><select class="ms" id="modalStatus"><option value="pending">Pending</option><option value="in_progress">In Progress</option><option value="completed">Completed</option><option value="abandoned">Abandoned</option></select></div>
      </div>
      <div class="mf" id="modalVerifySection" style="display:none"><label class="ml">Verify Status</label><div id="modalVerifyList" style="font-family:var(--mono);font-size:11px;color:var(--text2);padding:6px 0"></div></div>
    </div>
    <div class="mfo"><button class="mbtn mbtn-d" id="modalDelete">Delete</button><button class="mbtn mbtn-s" id="modalCancel">Cancel</button><button class="mbtn mbtn-p" id="modalSave">Save Changes</button></div>
  </div>
</div>
<div class="kbd-toast" id="kbdToast"><span><kbd>n</kbd> new task</span><span><kbd>/</kbd> search</span><span><kbd>Esc</kbd> close</span><span><kbd>?</kbd> shortcuts</span></div>
<script>
let tasks=[],config={url:'',key:''},eventSource=null,currentView='kanban',activityVisible=true,sseRetryDelay=1000,sseRetryTimer=null,editingTaskId=null;
let filters={search:'',priority:'all',actor:'all',type:'all'};
(function(){loadConfig();setupEvents();if(config.url){hideSetup();connect()}else showSetup();setTimeout(()=>{const t=document.getElementById('kbdToast');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),4000)},1500)})();
function loadConfig(){try{const s=localStorage.getItem('board-config-v2');if(s){config=JSON.parse(s);document.getElementById('inputUrl').value=config.url||'';document.getElementById('inputKey').value=config.key||''}}catch{}}
function saveConfig(){config.url=document.getElementById('inputUrl').value.replace(/\/+$/,'');config.key=document.getElementById('inputKey').value;localStorage.setItem('board-config-v2',JSON.stringify(config))}
function showSetup(){document.getElementById('setupPanel').style.display=''}
function hideSetup(){document.getElementById('setupPanel').style.display='none'}
function setupEvents(){
  document.getElementById('btnSetup').onclick=()=>{const p=document.getElementById('setupPanel');p.style.display=p.style.display==='none'?'':'none'};
  document.getElementById('btnConnect').onclick=()=>{saveConfig();connect();hideSetup()};
  document.getElementById('btnActivity').onclick=()=>{activityVisible=!activityVisible;document.getElementById('activityPanel').classList.toggle('collapsed',!activityVisible)};
  document.getElementById('btnClearActivity').onclick=()=>{document.getElementById('activityList').innerHTML=''};
  document.querySelectorAll('.view-btn').forEach(b=>{b.onclick=()=>switchView(b.dataset.view)});
  document.querySelectorAll('.atb').forEach(b=>{b.onclick=()=>{const c=b.dataset.col;b.style.display='none';const f=document.querySelector('.atf[data-col="'+c+'"]');f.classList.add('active');f.querySelector('input').focus()}});
  document.querySelectorAll('.bs').forEach(b=>{b.onclick=()=>saveNewTask(b.dataset.col)});
  document.querySelectorAll('.bc').forEach(b=>{b.onclick=()=>cancelAdd(b.dataset.col)});
  document.querySelectorAll('.atf input').forEach(i=>{i.onkeydown=e=>{if(e.key==='Enter')saveNewTask(i.dataset.col);if(e.key==='Escape')cancelAdd(i.dataset.col)}});
  document.querySelectorAll('.po').forEach(o=>{o.onclick=()=>{o.closest('.ps').querySelectorAll('.po').forEach(x=>x.classList.remove('selected'));o.classList.add('selected')}});
  document.querySelectorAll('.tt').forEach(b=>{b.onclick=()=>{const g=b.dataset.type==='task';b.dataset.type=g?'goal':'task';b.textContent=g?'goal':'task';b.classList.toggle('goal',g)}});
  document.querySelectorAll('[data-fp]').forEach(c=>{c.onclick=()=>{document.querySelectorAll('[data-fp]').forEach(x=>x.classList.remove('active'));c.classList.add('active');filters.priority=c.dataset.fp;render()}});
  document.querySelectorAll('[data-fa]').forEach(c=>{c.onclick=()=>{document.querySelectorAll('[data-fa]').forEach(x=>{x.classList.remove('active','a-orange','a-teal')});c.classList.add('active');if(c.dataset.fa==='human')c.classList.add('a-orange');if(c.dataset.fa==='agent')c.classList.add('a-teal');filters.actor=c.dataset.fa;render()}});
  document.querySelectorAll('[data-ft]').forEach(c=>{c.onclick=()=>{document.querySelectorAll('[data-ft]').forEach(x=>x.classList.remove('active'));c.classList.add('active');filters.type=c.dataset.ft;render()}});
  document.getElementById('searchInput').addEventListener('input',e=>{filters.search=e.target.value.toLowerCase();render()});
  document.getElementById('modalClose').onclick=closeModal;document.getElementById('modalCancel').onclick=closeModal;
  document.getElementById('modalSave').onclick=saveModal;document.getElementById('modalDelete').onclick=deleteFromModal;
  document.getElementById('editModal').onclick=e=>{if(e.target===document.getElementById('editModal'))closeModal()};
  document.addEventListener('keydown',e=>{
    if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT'){if(e.key==='Escape'){e.target.blur();closeModal()}return}
    if(e.key==='/'){e.preventDefault();document.getElementById('searchInput').focus()}
    else if(e.key==='n'){e.preventDefault();const b=document.querySelector('.atb[data-col="pending"]');if(b)b.click()}
    else if(e.key==='Escape')closeModal();
    else if(e.key==='?'){const t=document.getElementById('kbdToast');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),4000)}
  });
  setupDragDrop();
}
async function connect(){setConn('connecting');try{await fetchTasks();connectSSE();setConn('ok');sseRetryDelay=1000}catch(e){console.error('Connect:',e);setConn('error')}}
function setConn(s){const d=document.getElementById('connDot'),l=document.getElementById('connLabel');d.className='conn-dot';if(s==='ok'){d.classList.add('ok');l.textContent='connected'}else if(s==='error'){d.classList.add('error');l.textContent='reconnecting...'}else l.textContent=s}
function hdrs(){const h={'Content-Type':'application/json'};if(config.key)h['x-api-key']=config.key;return h}
async function fetchTasks(){const r=await fetch(config.url+'/api/task-queue',{headers:hdrs()});if(!r.ok)throw new Error(r.status);const d=await r.json();tasks=d.tasks||[];render()}
function connectSSE(){
  if(eventSource)eventSource.close();if(sseRetryTimer){clearTimeout(sseRetryTimer);sseRetryTimer=null}
  eventSource=new EventSource(config.url+'/api/events');
  eventSource.onopen=()=>{setConn('ok');sseRetryDelay=1000};
  eventSource.onerror=()=>{setConn('error');eventSource.close();sseRetryTimer=setTimeout(()=>{sseRetryDelay=Math.min(sseRetryDelay*1.5,30000);connectSSE();fetchTasks()},sseRetryDelay)};
  eventSource.onmessage=ev=>{try{const p=JSON.parse(ev.data);if(p.type==='action:task')handleTaskEvent(p)}catch{}};
}
function handleTaskEvent(payload){
  const{data}=payload;if(!data)return;const content=data.content||'',entry=data.entry;
  const origin=entry?.payload?.origin||entry?.source||'agent',isHuman=origin==='task-board'||origin==='human';
  if(content.startsWith('deleted:')){tasks=tasks.filter(t=>t.id!==content.replace('deleted:',''));addActivity(isHuman?'human':'agent','Deleted task');render();return}
  if(!entry)return;const idx=tasks.findIndex(t=>t.id===entry.id);
  if(idx>=0){const old=tasks[idx].status;tasks[idx]=entry;addActivity(isHuman?'human':'agent',old!==entry.status?'Moved "'+trunc(entry.summary,35)+'" → '+statusLabel(entry.status):'Updated "'+trunc(entry.summary,35)+'"')}
  else{tasks.push(entry);addActivity(isHuman?'human':'agent','Created "'+trunc(entry.summary,35)+'"')}
  render();
}
function getActor(t){const o=(t.payload?.origin||t.source||'').toLowerCase();return['task-board','human','alex'].includes(o)?'human':'agent'}
function matchesFilters(t){
  if(filters.search&&!((t.summary||'')+(t.id||'')).toLowerCase().includes(filters.search))return false;
  if(filters.priority!=='all'&&String(t.payload?.priority??2)!==filters.priority)return false;
  if(filters.actor!=='all'&&getActor(t)!==filters.actor)return false;
  if(filters.type!=='all'&&(t.type||'task')!==filters.type)return false;return true;
}
function render(){
  const aP=tasks.filter(t=>t.status==='pending'),aA=tasks.filter(t=>t.status==='in_progress'),aD=tasks.filter(t=>t.status==='completed');
  const p=aP.filter(matchesFilters).sort(sortT),a=aA.filter(matchesFilters).sort(sortT),d=aD.filter(matchesFilters).sort((a,b)=>b.ts.localeCompare(a.ts));
  renderCol('colPending',p);renderCol('colInProgress',a);renderCol('colCompleted',d.slice(0,50));
  document.querySelector('[data-count="pending"]').textContent=p.length;document.querySelector('[data-count="in_progress"]').textContent=a.length;document.querySelector('[data-count="completed"]').textContent=d.length;
  document.getElementById('statPending').textContent=aP.length;document.getElementById('statActive').textContent=aA.length;document.getElementById('statDone').textContent=aD.length;
  const total=aP.length+aA.length+aD.length,pct=total>0?Math.round(aD.length/total*100):0;
  document.getElementById('progressFill').style.width=pct+'%';document.getElementById('progressLabel').textContent=pct+'%';
  if(currentView==='dag')renderDAG();
}
function sortT(a,b){const pa=a.payload?.priority??2,pb=b.payload?.priority??2;return pa!==pb?pa-pb:a.ts.localeCompare(b.ts)}
function renderCol(id,items){
  const el=document.getElementById(id);if(!items.length){el.innerHTML='<div class="col-empty">No tasks</div>';return}
  el.innerHTML=items.map(cardHTML).join('');
  el.querySelectorAll('.tc').forEach(c=>{c.setAttribute('draggable','true');c.ondragstart=e=>{c.classList.add('dragging');e.dataTransfer.setData('text/plain',c.dataset.id);e.dataTransfer.effectAllowed='move'};c.ondragend=()=>c.classList.remove('dragging');c.onclick=e=>{if(e.target.closest('.ta'))return;openModal(c.dataset.id)}});
  el.querySelectorAll('.tab.delete').forEach(b=>{b.onclick=e=>{e.stopPropagation();deleteTask(b.dataset.id)}});
}
function cardHTML(t){
  const p=t.payload?.priority??2,tc=t.type==='goal'?'badge-goal':'badge-task',tl=t.type==='goal'?'goal':'task';
  const actor=getActor(t),ac=actor==='human'?'ah':'aa',al=actor==='human'?'Human':'Kuro';
  const origin=t.payload?.origin||t.source||'';
  const time=new Date(t.ts).toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'});
  const date=new Date(t.ts).toLocaleDateString('zh-TW',{month:'numeric',day:'numeric'});
  let vh='';const v=t.payload?.verify;
  if(v&&Array.isArray(v)&&v.length)vh='<div class="vd">'+v.map(x=>'<span class="'+(x.status||'unknown')+'" title="'+esc(x.name)+': '+x.status+(x.detail?' — '+esc(x.detail):'')+'"></span>').join('')+'</div>';
  return '<div class="tc" data-id="'+t.id+'" draggable="true"><div class="ta"><button class="tab delete" data-id="'+t.id+'" title="Delete">&times;</button></div><div class="card-top"><span class="task-type '+tc+'">'+tl+'</span><span class="pb p'+p+'">P'+p+'</span>'+vh+'<span class="ab '+ac+'">'+al+'</span></div><div class="task-title">'+esc(t.summary||t.id)+'</div><div class="task-meta">'+(origin?'<span class="task-origin">'+esc(origin)+'</span>':'')+'<span class="task-time">'+date+' '+time+'</span>'+(t.refs?.length?'<span>refs: '+t.refs.length+'</span>':'')+'</div></div>';
}
function setupDragDrop(){
  document.querySelectorAll('.column').forEach(col=>{const status=col.dataset.status;
    col.ondragover=e=>{e.preventDefault();e.dataTransfer.dropEffect='move';col.classList.add('drag-over')};
    col.ondragleave=e=>{if(!col.contains(e.relatedTarget))col.classList.remove('drag-over')};
    col.ondrop=async e=>{e.preventDefault();col.classList.remove('drag-over');const id=e.dataTransfer.getData('text/plain');if(!id)return;const task=tasks.find(t=>t.id===id);if(!task||task.status===status)return;task.status=status;render();try{await fetch(config.url+'/api/task-queue/'+id,{method:'PATCH',headers:hdrs(),body:JSON.stringify({status,origin:'task-board'})})}catch(err){console.error('Move:',err);fetchTasks()}};
  });
}
async function saveNewTask(col){
  const form=document.querySelector('.atf[data-col="'+col+'"]'),input=form.querySelector('input'),title=input.value.trim();if(!title)return;
  const sp=form.querySelector('.po.selected'),priority=sp?parseInt(sp.dataset.p):2,tb=form.closest('.atz').querySelector('.tt'),type=tb?.dataset.type||'task';
  try{await fetch(config.url+'/api/task-queue',{method:'POST',headers:hdrs(),body:JSON.stringify({title,status:col,priority,type,origin:'task-board'})});input.value='';cancelAdd(col)}catch(e){console.error('Create:',e)}
}
function cancelAdd(col){const form=document.querySelector('.atf[data-col="'+col+'"]'),btn=document.querySelector('.atb[data-col="'+col+'"]');form.classList.remove('active');form.querySelector('input').value='';if(btn)btn.style.display=''}
async function deleteTask(id){try{await fetch(config.url+'/api/task-queue/'+id,{method:'DELETE',headers:hdrs()});tasks=tasks.filter(t=>t.id!==id);render()}catch(e){console.error('Delete:',e)}}
function openModal(taskId){
  const task=tasks.find(t=>t.id===taskId);if(!task)return;editingTaskId=taskId;
  document.getElementById('modalTitle').value=task.summary||'';document.getElementById('modalPriority').value=String(task.payload?.priority??2);
  document.getElementById('modalType').value=task.type||'task';document.getElementById('modalStatus').value=task.status||'pending';
  const v=task.payload?.verify,vs=document.getElementById('modalVerifySection'),vl=document.getElementById('modalVerifyList');
  if(v&&Array.isArray(v)&&v.length){vs.style.display='';vl.innerHTML=v.map(x=>{const c=x.status==='pass'?'var(--green)':x.status==='fail'?'var(--red)':'var(--text3)';return'<div style="margin-bottom:3px"><span style="color:'+c+'">'+x.status+'</span> '+esc(x.name)+(x.detail?' — '+esc(x.detail):'')+'</div>'}).join('')}else vs.style.display='none';
  document.getElementById('editModal').classList.add('open');document.getElementById('modalTitle').focus();
}
function closeModal(){editingTaskId=null;document.getElementById('editModal').classList.remove('open')}
async function saveModal(){if(!editingTaskId)return;const title=document.getElementById('modalTitle').value.trim();if(!title)return;
  const priority=parseInt(document.getElementById('modalPriority').value),type=document.getElementById('modalType').value,status=document.getElementById('modalStatus').value;
  try{await fetch(config.url+'/api/task-queue/'+editingTaskId,{method:'PATCH',headers:hdrs(),body:JSON.stringify({title,priority,type,status,origin:'task-board'})});closeModal();setTimeout(fetchTasks,300)}catch(e){console.error('Update:',e)}}
async function deleteFromModal(){if(!editingTaskId)return;await deleteTask(editingTaskId);closeModal()}
function switchView(v){currentView=v;document.querySelectorAll('.view-btn').forEach(b=>b.classList.toggle('active',b.dataset.view===v));document.getElementById('kanbanView').style.display=v==='kanban'?'':'none';document.getElementById('dagView').classList.toggle('active',v==='dag');if(v==='dag')renderDAG()}
function renderDAG(){
  const container=document.getElementById('dagContainer'),at=tasks.filter(t=>t.status!=='abandoned'&&matchesFilters(t));
  const edges=[],nodeIds=new Set(at.map(t=>t.id));
  at.forEach(t=>{if(t.refs?.length)t.refs.forEach(ref=>{if(nodeIds.has(ref))edges.push({from:ref,to:t.id})})});
  if(!at.length){container.innerHTML='<div class="dag-empty">No tasks to display.</div>';return}
  const inD={},adj={};at.forEach(t=>{inD[t.id]=0;adj[t.id]=[]});edges.forEach(e=>{if(inD[e.to]!==undefined)inD[e.to]++;if(adj[e.from])adj[e.from].push(e.to)});
  const layers=[],visited=new Set();let queue=Object.keys(inD).filter(id=>inD[id]===0);if(!queue.length)queue=[at[0].id];
  while(queue.length){const layer=[],next=[];queue.forEach(id=>{if(visited.has(id))return;visited.add(id);layer.push(id);(adj[id]||[]).forEach(child=>{inD[child]--;if(inD[child]<=0&&!visited.has(child))next.push(child)})});if(layer.length)layers.push(layer);queue=next}
  const rem=at.filter(t=>!visited.has(t.id));if(rem.length)layers.push(rem.map(t=>t.id));
  const nW=200,nH=56,lG=80,nG=16,mL=Math.max(...layers.map(l=>l.length)),svgW=layers.length*(nW+lG)+40,svgH=mL*(nH+nG)+40;
  const pos={};layers.forEach((l,li)=>{const x=20+li*(nW+lG),tH=l.length*nH+(l.length-1)*nG,sY=(svgH-tH)/2;l.forEach((id,ni)=>{pos[id]={x,y:sY+ni*(nH+nG)}})});
  const sc={pending:{fill:'rgba(96,165,250,.12)',stroke:'#60a5fa'},in_progress:{fill:'rgba(251,191,36,.10)',stroke:'#fbbf24'},completed:{fill:'rgba(74,222,128,.10)',stroke:'#4ade80'}};
  let eS='';edges.forEach(e=>{const f=pos[e.from],t=pos[e.to];if(f&&t){const x1=f.x+nW,y1=f.y+nH/2,x2=t.x,y2=t.y+nH/2,mx=(x1+x2)/2;eS+='<path class="dag-edge" d="M'+x1+','+y1+' C'+mx+','+y1+' '+mx+','+y2+' '+x2+','+y2+'"/>'}});
  let nS='';at.forEach(t=>{const p=pos[t.id];if(!p)return;const c=sc[t.status]||sc.pending,lb=trunc(t.summary||t.id,24),pr=t.payload?.priority??2,actor=getActor(t),ac=actor==='human'?'#fb923c':'#5eead4';
    nS+='<g class="dag-node" transform="translate('+p.x+','+p.y+')" onclick="openModal(\''+t.id+'\')"><rect width="'+nW+'" height="'+nH+'" fill="'+c.fill+'" stroke="'+c.stroke+'"/><text x="10" y="18" font-size="10" fill="#6b6f7b" font-family="JetBrains Mono">P'+pr+' · '+(t.type||'task')+'</text><text x="10" y="36" font-size="11" fill="#d4d4d8">'+esc(lb)+'</text><circle cx="'+(nW-12)+'" cy="14" r="4" fill="'+ac+'" opacity=".8"/></g>'});
  container.innerHTML='<svg class="dag-svg" viewBox="0 0 '+svgW+' '+svgH+'" width="'+svgW+'" height="'+svgH+'"><defs><marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#363a45"/></marker></defs>'+eS+nS+'</svg>';
}
function addActivity(actor,text){const list=document.getElementById('activityList'),now=new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit',second:'2-digit'}),ac=actor==='human'?'ah2':'ak2',al=actor==='human'?'Human':'Kuro',item=document.createElement('div');item.className='ai';item.innerHTML='<span class="at">'+now+'</span><span class="aa2 '+ac+'">'+al+'</span> '+esc(text);list.insertBefore(item,list.firstChild);while(list.children.length>100)list.removeChild(list.lastChild)}
function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function trunc(s,n){if(!s)return'';return s.length>n?s.slice(0,n)+'...':s}
function statusLabel(s){return{pending:'Pending',in_progress:'In Progress',completed:'Completed',abandoned:'Abandoned'}[s]||s}
</script>
</body>
</html>
