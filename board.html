<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Task Board</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Noto+Sans+TC:wght@300;400;500;600&family=Noto+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #08090a;
    --surface: #111214;
    --surface2: #181a1e;
    --surface3: #1e2025;
    --border: #262830;
    --border-subtle: #1c1e24;
    --border-hover: #363a45;
    --text: #d4d4d8;
    --text-bright: #f0f0f2;
    --text2: #6b6f7b;
    --text3: #454854;
    --accent: #5eead4;
    --accent-dim: rgba(94, 234, 212, 0.12);
    --accent-glow: rgba(94, 234, 212, 0.06);
    --blue: #60a5fa;
    --blue-dim: rgba(96, 165, 250, 0.12);
    --yellow: #fbbf24;
    --yellow-dim: rgba(251, 191, 36, 0.10);
    --red: #f87171;
    --red-dim: rgba(248, 113, 113, 0.10);
    --purple: #a78bfa;
    --purple-dim: rgba(167, 139, 250, 0.10);
    --orange: #fb923c;
    --orange-dim: rgba(251, 147, 60, 0.10);
    --green: #4ade80;
    --green-dim: rgba(74, 222, 128, 0.10);
    --mono: 'JetBrains Mono', 'SF Mono', monospace;
    --sans: 'Noto Sans TC', 'Noto Sans', system-ui, sans-serif;
    --radius: 8px;
    --radius-sm: 5px;
    --col-gap: 16px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    display: flex;
    flex-direction: column;
  }

  /* Noise */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    z-index: 9999;
    pointer-events: none;
    opacity: 0.015;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 256px 256px;
  }

  /* ── Header ── */
  .header {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border-subtle);
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--surface);
    flex-shrink: 0;
    z-index: 10;
  }

  .header-title {
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: -0.02em;
  }
  .header-title span { color: var(--text3); font-weight: 300; }

  .conn-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--text3);
    transition: all 0.5s;
    flex-shrink: 0;
  }
  .conn-dot.ok { background: var(--accent); box-shadow: 0 0 8px var(--accent-dim); }
  .conn-dot.error { background: var(--red); box-shadow: 0 0 8px var(--red-dim); }

  .conn-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text3);
  }

  .header-spacer { flex: 1; }

  .header-stats {
    display: flex;
    gap: 14px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text2);
  }
  .header-stats .stat-val { color: var(--text-bright); font-weight: 500; }

  .view-toggle {
    display: flex;
    gap: 2px;
    background: var(--surface2);
    border-radius: var(--radius-sm);
    padding: 2px;
  }
  .view-btn {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text3);
    background: none;
    border: none;
    padding: 4px 10px;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.03em;
  }
  .view-btn:hover { color: var(--text2); }
  .view-btn.active { background: var(--surface3); color: var(--text); }

  .header-btn {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text3);
    background: none;
    border: 1px solid var(--border);
    padding: 4px 10px;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .header-btn:hover { color: var(--text); border-color: var(--border-hover); }

  /* ── Setup Panel ── */
  .setup {
    padding: 16px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border-subtle);
    flex-shrink: 0;
  }
  .setup-grid {
    display: grid;
    grid-template-columns: 1fr 1fr auto;
    gap: 10px;
    align-items: end;
  }
  .setup label {
    display: block;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .setup input {
    width: 100%;
    padding: 7px 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    outline: none;
    transition: border-color 0.2s;
  }
  .setup input:focus { border-color: var(--accent); }
  .setup-btn {
    padding: 7px 16px;
    background: var(--accent-dim);
    border: 1px solid rgba(94, 234, 212, 0.25);
    border-radius: 3px;
    color: var(--accent);
    font-family: var(--mono);
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .setup-btn:hover { background: rgba(94, 234, 212, 0.18); }

  /* ── Main Content ── */
  .main { flex: 1; display: flex; overflow: hidden; }

  /* ── Kanban View ── */
  .kanban {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: var(--col-gap);
    padding: 16px 20px;
    overflow: hidden;
  }

  .column {
    display: flex;
    flex-direction: column;
    min-height: 0;
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border-subtle);
    overflow: hidden;
  }

  .col-header {
    padding: 12px 14px 10px;
    border-bottom: 1px solid var(--border-subtle);
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  .col-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .col-dot.pending { background: var(--blue); box-shadow: 0 0 6px var(--blue-dim); }
  .col-dot.in_progress { background: var(--yellow); box-shadow: 0 0 6px var(--yellow-dim); }
  .col-dot.completed { background: var(--green); box-shadow: 0 0 6px var(--green-dim); }

  .col-title {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    color: var(--text2);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .col-count {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text3);
    margin-left: auto;
  }

  .col-body {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .col-body::-webkit-scrollbar { width: 4px; }
  .col-body::-webkit-scrollbar-track { background: transparent; }
  .col-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .col-body::-webkit-scrollbar-thumb:hover { background: var(--border-hover); }

  /* Drop zone visual */
  .column.drag-over .col-body {
    background: var(--accent-glow);
    outline: 1px dashed rgba(94, 234, 212, 0.3);
    outline-offset: -4px;
    border-radius: var(--radius-sm);
  }

  /* ── Task Card ── */
  .task-card {
    background: var(--surface2);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    cursor: grab;
    transition: all 0.15s;
    position: relative;
  }
  .task-card:hover {
    border-color: var(--border-hover);
    background: var(--surface3);
  }
  .task-card:active { cursor: grabbing; }
  .task-card.dragging {
    opacity: 0.4;
    transform: scale(0.97);
  }
  .task-card.ghost {
    border-color: var(--accent);
    background: var(--accent-glow);
    box-shadow: 0 0 12px var(--accent-dim);
  }

  .task-type {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .task-type .badge-task { color: var(--blue); }
  .task-type .badge-goal { color: var(--purple); }

  .priority-badge {
    font-family: var(--mono);
    font-size: 9px;
    padding: 1px 5px;
    border-radius: 3px;
    font-weight: 500;
  }
  .priority-badge.p0 { background: var(--red-dim); color: var(--red); }
  .priority-badge.p1 { background: var(--orange-dim); color: var(--orange); }
  .priority-badge.p2 { background: var(--surface3); color: var(--text3); }
  .priority-badge.p3 { background: var(--surface3); color: var(--text3); opacity: 0.6; }

  .task-title {
    font-size: 12px;
    color: var(--text);
    line-height: 1.45;
    word-break: break-word;
  }

  .task-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 6px;
    font-family: var(--mono);
    font-size: 9px;
    color: var(--text3);
  }
  .task-origin {
    padding: 1px 5px;
    background: var(--surface3);
    border-radius: 3px;
  }
  .task-time { opacity: 0.7; }

  .task-actions {
    position: absolute;
    top: 6px;
    right: 6px;
    display: flex;
    gap: 2px;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .task-card:hover .task-actions { opacity: 1; }

  .task-act-btn {
    width: 20px; height: 20px;
    border: none;
    background: var(--surface3);
    color: var(--text3);
    border-radius: 3px;
    cursor: pointer;
    font-size: 11px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.1s;
  }
  .task-act-btn:hover { color: var(--text); background: var(--border); }
  .task-act-btn.delete:hover { color: var(--red); background: var(--red-dim); }

  /* ── Add Task ── */
  .add-task-zone {
    padding: 6px 8px;
    flex-shrink: 0;
    border-top: 1px solid var(--border-subtle);
  }
  .add-task-btn {
    width: 100%;
    padding: 6px;
    background: none;
    border: 1px dashed var(--border);
    border-radius: var(--radius-sm);
    color: var(--text3);
    font-family: var(--mono);
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .add-task-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }

  .add-task-form {
    display: none;
    flex-direction: column;
    gap: 6px;
  }
  .add-task-form.active { display: flex; }
  .add-task-form input {
    padding: 7px 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text);
    font-size: 12px;
    outline: none;
  }
  .add-task-form input:focus { border-color: var(--accent); }
  .add-task-form-actions {
    display: flex;
    gap: 4px;
  }
  .add-task-form-actions button {
    flex: 1;
    padding: 5px 8px;
    border: none;
    border-radius: 3px;
    font-family: var(--mono);
    font-size: 10px;
    cursor: pointer;
    transition: all 0.1s;
  }
  .btn-save {
    background: var(--accent-dim);
    color: var(--accent);
  }
  .btn-save:hover { background: rgba(94, 234, 212, 0.2); }
  .btn-cancel {
    background: var(--surface3);
    color: var(--text3);
  }
  .btn-cancel:hover { color: var(--text); }

  .priority-select {
    display: flex;
    gap: 3px;
  }
  .priority-opt {
    font-family: var(--mono);
    font-size: 9px;
    padding: 2px 6px;
    border: 1px solid var(--border);
    border-radius: 3px;
    background: none;
    color: var(--text3);
    cursor: pointer;
    transition: all 0.1s;
  }
  .priority-opt:hover { border-color: var(--border-hover); color: var(--text2); }
  .priority-opt.selected { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }

  /* ── DAG View ── */
  .dag-view {
    flex: 1;
    display: none;
    padding: 20px;
    overflow: auto;
    position: relative;
  }
  .dag-view.active { display: flex; flex-direction: column; }

  .dag-container {
    flex: 1;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    overflow: auto;
  }

  .dag-svg {
    max-width: 100%;
  }

  .dag-empty {
    color: var(--text3);
    font-family: var(--mono);
    font-size: 12px;
    text-align: center;
    padding: 60px 20px;
  }

  /* SVG styles */
  .dag-node rect {
    rx: 6;
    ry: 6;
    stroke-width: 1.5;
    transition: all 0.2s;
    cursor: pointer;
  }
  .dag-node rect:hover {
    stroke-width: 2;
    filter: brightness(1.15);
  }
  .dag-node text {
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 11px;
    fill: var(--text);
  }
  .dag-edge {
    stroke: var(--border-hover);
    stroke-width: 1.5;
    fill: none;
    marker-end: url(#arrowhead);
  }

  /* ── Activity Feed (sidebar) ── */
  .activity-panel {
    width: 280px;
    border-left: 1px solid var(--border-subtle);
    background: var(--surface);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow: hidden;
  }
  .activity-panel.collapsed { width: 0; border: none; }

  .activity-header {
    padding: 12px 14px 10px;
    border-bottom: 1px solid var(--border-subtle);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .activity-title {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    color: var(--text2);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .activity-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }
  .activity-list::-webkit-scrollbar { width: 4px; }
  .activity-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .activity-item {
    padding: 8px 10px;
    border-radius: var(--radius-sm);
    margin-bottom: 4px;
    font-size: 11px;
    line-height: 1.4;
    color: var(--text2);
    animation: fadeSlide 0.3s ease;
  }
  .activity-item .activity-time {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--text3);
    display: block;
    margin-bottom: 2px;
  }
  .activity-item .activity-actor {
    font-weight: 500;
  }
  .activity-item .actor-human { color: var(--orange); }
  .activity-item .actor-agent { color: var(--accent); }

  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── Empty state ── */
  .col-empty {
    padding: 20px 12px;
    text-align: center;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
    opacity: 0.6;
  }

  /* ── Responsive ── */
  @media (max-width: 768px) {
    .kanban {
      grid-template-columns: 1fr;
      gap: 12px;
    }
    .activity-panel { display: none; }
    .column { max-height: 40vh; }
  }
</style>
</head>
<body>

<!-- ── Header ── -->
<div class="header">
  <div class="header-title">Task Board<span> ¹</span></div>
  <div class="conn-dot" id="connDot"></div>
  <div class="conn-label" id="connLabel">disconnected</div>
  <div class="header-spacer"></div>
  <div class="header-stats" id="stats">
    <span>pending: <span class="stat-val" id="statPending">0</span></span>
    <span>active: <span class="stat-val" id="statActive">0</span></span>
    <span>done: <span class="stat-val" id="statDone">0</span></span>
  </div>
  <div class="view-toggle">
    <button class="view-btn active" data-view="kanban">KANBAN</button>
    <button class="view-btn" data-view="dag">DAG</button>
  </div>
  <button class="header-btn" id="btnSetup">setup</button>
  <button class="header-btn" id="btnActivity">activity</button>
</div>

<!-- ── Setup ── -->
<div class="setup" id="setupPanel" style="display:none">
  <div class="setup-grid">
    <div>
      <label>Server URL</label>
      <input type="text" id="inputUrl" placeholder="http://localhost:3001">
    </div>
    <div>
      <label>API Key</label>
      <input type="password" id="inputKey" placeholder="your-api-key">
    </div>
    <button class="setup-btn" id="btnConnect">Connect</button>
  </div>
</div>

<!-- ── Main ── -->
<div class="main">
  <!-- Kanban -->
  <div class="kanban" id="kanbanView">
    <!-- Pending -->
    <div class="column" data-status="pending">
      <div class="col-header">
        <div class="col-dot pending"></div>
        <div class="col-title">Pending</div>
        <div class="col-count" data-count="pending">0</div>
      </div>
      <div class="col-body" id="colPending"></div>
      <div class="add-task-zone">
        <button class="add-task-btn" data-col="pending">+ Add Task</button>
        <div class="add-task-form" data-col="pending">
          <input type="text" placeholder="Task title..." data-col="pending">
          <div class="priority-select" data-col="pending">
            <button class="priority-opt" data-p="0">P0</button>
            <button class="priority-opt" data-p="1">P1</button>
            <button class="priority-opt selected" data-p="2">P2</button>
            <button class="priority-opt" data-p="3">P3</button>
          </div>
          <div class="add-task-form-actions">
            <button class="btn-save" data-col="pending">Save</button>
            <button class="btn-cancel" data-col="pending">Cancel</button>
          </div>
        </div>
      </div>
    </div>

    <!-- In Progress -->
    <div class="column" data-status="in_progress">
      <div class="col-header">
        <div class="col-dot in_progress"></div>
        <div class="col-title">In Progress</div>
        <div class="col-count" data-count="in_progress">0</div>
      </div>
      <div class="col-body" id="colInProgress"></div>
      <div class="add-task-zone">
        <button class="add-task-btn" data-col="in_progress">+ Add Task</button>
        <div class="add-task-form" data-col="in_progress">
          <input type="text" placeholder="Task title..." data-col="in_progress">
          <div class="priority-select" data-col="in_progress">
            <button class="priority-opt" data-p="0">P0</button>
            <button class="priority-opt" data-p="1">P1</button>
            <button class="priority-opt selected" data-p="2">P2</button>
            <button class="priority-opt" data-p="3">P3</button>
          </div>
          <div class="add-task-form-actions">
            <button class="btn-save" data-col="in_progress">Save</button>
            <button class="btn-cancel" data-col="in_progress">Cancel</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Completed -->
    <div class="column" data-status="completed">
      <div class="col-header">
        <div class="col-dot completed"></div>
        <div class="col-title">Completed</div>
        <div class="col-count" data-count="completed">0</div>
      </div>
      <div class="col-body" id="colCompleted"></div>
    </div>
  </div>

  <!-- DAG View -->
  <div class="dag-view" id="dagView">
    <div class="dag-container" id="dagContainer">
      <div class="dag-empty">No dependency graph available.<br>Tasks with refs will show connections here.</div>
    </div>
  </div>

  <!-- Activity Panel -->
  <div class="activity-panel" id="activityPanel">
    <div class="activity-header">
      <div class="activity-title">Activity</div>
    </div>
    <div class="activity-list" id="activityList"></div>
  </div>
</div>

<script>
// ── State ──
let tasks = [];
let config = { url: '', key: '' };
let eventSource = null;
let currentView = 'kanban';
let activityVisible = true;

// ── Init ──
(function init() {
  loadConfig();
  setupEventListeners();
  if (config.url) {
    hideSetup();
    connect();
  } else {
    showSetup();
  }
})();

function loadConfig() {
  try {
    const saved = localStorage.getItem('board-config');
    if (saved) {
      config = JSON.parse(saved);
      document.getElementById('inputUrl').value = config.url || '';
      document.getElementById('inputKey').value = config.key || '';
    }
  } catch {}
}

function saveConfig() {
  config.url = document.getElementById('inputUrl').value.replace(/\/+$/, '');
  config.key = document.getElementById('inputKey').value;
  localStorage.setItem('board-config', JSON.stringify(config));
}

function showSetup() { document.getElementById('setupPanel').style.display = ''; }
function hideSetup() { document.getElementById('setupPanel').style.display = 'none'; }

// ── Event Listeners ──
function setupEventListeners() {
  document.getElementById('btnSetup').onclick = () => {
    const p = document.getElementById('setupPanel');
    p.style.display = p.style.display === 'none' ? '' : 'none';
  };

  document.getElementById('btnConnect').onclick = () => {
    saveConfig();
    connect();
    hideSetup();
  };

  document.getElementById('btnActivity').onclick = () => {
    activityVisible = !activityVisible;
    document.getElementById('activityPanel').classList.toggle('collapsed', !activityVisible);
  };

  // View toggle
  document.querySelectorAll('.view-btn').forEach(btn => {
    btn.onclick = () => switchView(btn.dataset.view);
  });

  // Add task buttons
  document.querySelectorAll('.add-task-btn').forEach(btn => {
    btn.onclick = () => {
      const col = btn.dataset.col;
      btn.style.display = 'none';
      const form = document.querySelector(`.add-task-form[data-col="${col}"]`);
      form.classList.add('active');
      form.querySelector('input').focus();
    };
  });

  // Save task
  document.querySelectorAll('.btn-save').forEach(btn => {
    btn.onclick = () => saveNewTask(btn.dataset.col);
  });

  // Cancel add
  document.querySelectorAll('.btn-cancel').forEach(btn => {
    btn.onclick = () => cancelAdd(btn.dataset.col);
  });

  // Enter key on input
  document.querySelectorAll('.add-task-form input').forEach(input => {
    input.onkeydown = (e) => {
      if (e.key === 'Enter') saveNewTask(input.dataset.col);
      if (e.key === 'Escape') cancelAdd(input.dataset.col);
    };
  });

  // Priority select
  document.querySelectorAll('.priority-opt').forEach(opt => {
    opt.onclick = () => {
      const parent = opt.closest('.priority-select');
      parent.querySelectorAll('.priority-opt').forEach(o => o.classList.remove('selected'));
      opt.classList.add('selected');
    };
  });

  // Drag and drop
  setupDragDrop();
}

// ── Connection ──
async function connect() {
  setConn('connecting');
  try {
    await fetchTasks();
    connectSSE();
    setConn('ok');
  } catch (err) {
    console.error('Connect failed:', err);
    setConn('error');
  }
}

function setConn(state) {
  const dot = document.getElementById('connDot');
  const label = document.getElementById('connLabel');
  dot.className = 'conn-dot';
  if (state === 'ok') {
    dot.classList.add('ok');
    label.textContent = 'connected';
  } else if (state === 'error') {
    dot.classList.add('error');
    label.textContent = 'error';
  } else {
    label.textContent = state;
  }
}

function headers() {
  const h = { 'Content-Type': 'application/json' };
  if (config.key) h['x-api-key'] = config.key;
  return h;
}

// ── Fetch Tasks ──
async function fetchTasks() {
  const res = await fetch(`${config.url}/api/task-queue`, { headers: headers() });
  if (!res.ok) throw new Error(`${res.status}`);
  const data = await res.json();
  tasks = data.tasks || [];
  render();
}

// ── SSE ──
function connectSSE() {
  if (eventSource) eventSource.close();
  eventSource = new EventSource(`${config.url}/api/events`);

  eventSource.onopen = () => setConn('ok');
  eventSource.onerror = () => setConn('error');

  eventSource.onmessage = (ev) => {
    try {
      const payload = JSON.parse(ev.data);
      if (payload.type === 'action:task') {
        handleTaskEvent(payload);
      }
    } catch {}
  };
}

function handleTaskEvent(payload) {
  const { data } = payload;
  if (!data) return;

  const content = data.content || '';
  const entry = data.entry;

  // Determine actor from entry source
  const origin = entry?.payload?.origin || entry?.source || 'agent';
  const isHuman = origin === 'task-board' || origin === 'human';

  // Delete event
  if (content.startsWith('deleted:')) {
    const delId = content.replace('deleted:', '');
    tasks = tasks.filter(t => t.id !== delId);
    addActivity(isHuman ? 'human' : 'agent', `Deleted task`);
    render();
    return;
  }

  if (!entry) return;

  // Update or add
  const idx = tasks.findIndex(t => t.id === entry.id);
  if (idx >= 0) {
    const oldStatus = tasks[idx].status;
    tasks[idx] = entry;
    if (oldStatus !== entry.status) {
      addActivity(isHuman ? 'human' : 'agent', `Moved "${truncate(entry.summary, 40)}" → ${statusLabel(entry.status)}`);
    } else {
      addActivity(isHuman ? 'human' : 'agent', `Updated "${truncate(entry.summary, 40)}"`);
    }
  } else {
    tasks.push(entry);
    addActivity(isHuman ? 'human' : 'agent', `Created "${truncate(entry.summary, 40)}"`);
  }
  render();
}

// ── Render ──
function render() {
  const pending = tasks.filter(t => t.status === 'pending').sort(sortTasks);
  const active = tasks.filter(t => t.status === 'in_progress').sort(sortTasks);
  const done = tasks.filter(t => t.status === 'completed').sort((a, b) => b.ts.localeCompare(a.ts));

  renderColumn('colPending', pending);
  renderColumn('colInProgress', active);
  renderColumn('colCompleted', done);

  // Update counts
  document.querySelector('[data-count="pending"]').textContent = pending.length;
  document.querySelector('[data-count="in_progress"]').textContent = active.length;
  document.querySelector('[data-count="completed"]').textContent = done.length;

  document.getElementById('statPending').textContent = pending.length;
  document.getElementById('statActive').textContent = active.length;
  document.getElementById('statDone').textContent = done.length;

  // Update DAG if visible
  if (currentView === 'dag') renderDAG();
}

function sortTasks(a, b) {
  const pa = a.payload?.priority ?? 2;
  const pb = b.payload?.priority ?? 2;
  if (pa !== pb) return pa - pb;
  return a.ts.localeCompare(b.ts);
}

function renderColumn(containerId, items) {
  const el = document.getElementById(containerId);
  if (!items.length) {
    el.innerHTML = '<div class="col-empty">No tasks</div>';
    return;
  }
  el.innerHTML = items.map(t => cardHTML(t)).join('');

  // Reattach drag handlers
  el.querySelectorAll('.task-card').forEach(card => {
    card.setAttribute('draggable', 'true');
    card.ondragstart = (e) => {
      card.classList.add('dragging');
      e.dataTransfer.setData('text/plain', card.dataset.id);
      e.dataTransfer.effectAllowed = 'move';
    };
    card.ondragend = () => card.classList.remove('dragging');
  });

  // Delete buttons
  el.querySelectorAll('.task-act-btn.delete').forEach(btn => {
    btn.onclick = (e) => {
      e.stopPropagation();
      deleteTask(btn.dataset.id);
    };
  });

  // Edit buttons
  el.querySelectorAll('.task-act-btn.edit').forEach(btn => {
    btn.onclick = (e) => {
      e.stopPropagation();
      editTask(btn.dataset.id);
    };
  });
}

function cardHTML(t) {
  const p = t.payload?.priority ?? 2;
  const typeClass = t.type === 'goal' ? 'badge-goal' : 'badge-task';
  const origin = t.payload?.origin || t.source || '';
  const time = new Date(t.ts).toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' });
  const date = new Date(t.ts).toLocaleDateString('zh-TW', { month: 'numeric', day: 'numeric' });

  return `<div class="task-card" data-id="${t.id}" draggable="true">
    <div class="task-actions">
      <button class="task-act-btn edit" data-id="${t.id}" title="Edit">&#9998;</button>
      <button class="task-act-btn delete" data-id="${t.id}" title="Delete">&times;</button>
    </div>
    <div class="task-type">
      <span class="${typeClass}">${t.type || 'task'}</span>
      <span class="priority-badge p${p}">P${p}</span>
    </div>
    <div class="task-title">${escapeHtml(t.summary || t.id)}</div>
    <div class="task-meta">
      ${origin ? `<span class="task-origin">${escapeHtml(origin)}</span>` : ''}
      <span class="task-time">${date} ${time}</span>
      ${t.refs?.length ? `<span>refs: ${t.refs.length}</span>` : ''}
    </div>
  </div>`;
}

// ── Drag & Drop ──
function setupDragDrop() {
  document.querySelectorAll('.column').forEach(col => {
    const body = col.querySelector('.col-body');
    const status = col.dataset.status;

    col.ondragover = (e) => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      col.classList.add('drag-over');
    };

    col.ondragleave = (e) => {
      if (!col.contains(e.relatedTarget)) {
        col.classList.remove('drag-over');
      }
    };

    col.ondrop = async (e) => {
      e.preventDefault();
      col.classList.remove('drag-over');
      const taskId = e.dataTransfer.getData('text/plain');
      if (!taskId) return;

      const task = tasks.find(t => t.id === taskId);
      if (!task || task.status === status) return;

      // Optimistic update
      task.status = status;
      render();

      // API call
      try {
        await fetch(`${config.url}/api/task-queue/${taskId}`, {
          method: 'PATCH',
          headers: headers(),
          body: JSON.stringify({ status, origin: 'task-board' })
        });
      } catch (err) {
        console.error('Move failed:', err);
        fetchTasks(); // Revert
      }
    };
  });
}

// ── CRUD ──
async function saveNewTask(col) {
  const form = document.querySelector(`.add-task-form[data-col="${col}"]`);
  const input = form.querySelector('input');
  const title = input.value.trim();
  if (!title) return;

  const selectedP = form.querySelector('.priority-opt.selected');
  const priority = selectedP ? parseInt(selectedP.dataset.p) : 2;

  try {
    await fetch(`${config.url}/api/task-queue`, {
      method: 'POST',
      headers: headers(),
      body: JSON.stringify({
        title,
        status: col,
        priority,
        origin: 'task-board'
      })
    });
    input.value = '';
    cancelAdd(col);
    // SSE will push the update
  } catch (err) {
    console.error('Create failed:', err);
  }
}

function cancelAdd(col) {
  const form = document.querySelector(`.add-task-form[data-col="${col}"]`);
  const btn = document.querySelector(`.add-task-btn[data-col="${col}"]`);
  form.classList.remove('active');
  form.querySelector('input').value = '';
  if (btn) btn.style.display = '';
}

async function deleteTask(id) {
  if (!confirm('Delete this task?')) return;
  try {
    await fetch(`${config.url}/api/task-queue/${id}`, {
      method: 'DELETE',
      headers: headers()
    });
    tasks = tasks.filter(t => t.id !== id);
    render();
  } catch (err) {
    console.error('Delete failed:', err);
  }
}

async function editTask(id) {
  const task = tasks.find(t => t.id === id);
  if (!task) return;

  const newTitle = prompt('Edit task title:', task.summary);
  if (newTitle === null || newTitle.trim() === '') return;

  try {
    await fetch(`${config.url}/api/task-queue/${id}`, {
      method: 'PATCH',
      headers: headers(),
      body: JSON.stringify({ title: newTitle.trim(), origin: 'task-board' })
    });
  } catch (err) {
    console.error('Edit failed:', err);
  }
}

// ── DAG Rendering ──
function switchView(view) {
  currentView = view;
  document.querySelectorAll('.view-btn').forEach(b => b.classList.toggle('active', b.dataset.view === view));
  document.getElementById('kanbanView').style.display = view === 'kanban' ? '' : 'none';
  document.getElementById('dagView').classList.toggle('active', view === 'dag');
  if (view === 'dag') renderDAG();
}

function renderDAG() {
  const container = document.getElementById('dagContainer');
  const activeTasks = tasks.filter(t => t.status !== 'abandoned');

  // Build adjacency from refs
  const edges = [];
  const nodeIds = new Set(activeTasks.map(t => t.id));

  activeTasks.forEach(t => {
    if (t.refs?.length) {
      t.refs.forEach(ref => {
        if (nodeIds.has(ref)) {
          edges.push({ from: ref, to: t.id });
        }
      });
    }
  });

  if (!activeTasks.length) {
    container.innerHTML = '<div class="dag-empty">No tasks to display.</div>';
    return;
  }

  // Layout: simple layered approach
  // Topological sort for layers
  const inDegree = {};
  const adj = {};
  activeTasks.forEach(t => {
    inDegree[t.id] = 0;
    adj[t.id] = [];
  });
  edges.forEach(e => {
    if (inDegree[e.to] !== undefined) inDegree[e.to]++;
    if (adj[e.from]) adj[e.from].push(e.to);
  });

  // BFS layering
  const layers = [];
  const visited = new Set();
  let queue = Object.keys(inDegree).filter(id => inDegree[id] === 0);
  if (!queue.length) queue = [activeTasks[0].id]; // fallback

  while (queue.length) {
    const layer = [];
    const next = [];
    queue.forEach(id => {
      if (visited.has(id)) return;
      visited.add(id);
      layer.push(id);
      (adj[id] || []).forEach(child => {
        inDegree[child]--;
        if (inDegree[child] <= 0 && !visited.has(child)) {
          next.push(child);
        }
      });
    });
    if (layer.length) layers.push(layer);
    queue = next;
  }

  // Add any remaining unvisited
  const remaining = activeTasks.filter(t => !visited.has(t.id));
  if (remaining.length) layers.push(remaining.map(t => t.id));

  // Calculate positions
  const nodeW = 180, nodeH = 50, layerGap = 80, nodeGap = 20;
  const maxLayer = Math.max(...layers.map(l => l.length));
  const svgW = layers.length * (nodeW + layerGap) + 40;
  const svgH = maxLayer * (nodeH + nodeGap) + 40;

  const positions = {};
  layers.forEach((layer, li) => {
    const x = 20 + li * (nodeW + layerGap);
    const totalH = layer.length * nodeH + (layer.length - 1) * nodeGap;
    const startY = (svgH - totalH) / 2;
    layer.forEach((id, ni) => {
      positions[id] = { x, y: startY + ni * (nodeH + nodeGap) };
    });
  });

  // Build SVG
  const statusColors = {
    pending: { fill: 'rgba(96,165,250,0.12)', stroke: '#60a5fa' },
    in_progress: { fill: 'rgba(251,191,36,0.10)', stroke: '#fbbf24' },
    completed: { fill: 'rgba(74,222,128,0.10)', stroke: '#4ade80' },
  };

  let edgeSVG = '';
  edges.forEach(e => {
    const from = positions[e.from];
    const to = positions[e.to];
    if (from && to) {
      const x1 = from.x + nodeW;
      const y1 = from.y + nodeH / 2;
      const x2 = to.x;
      const y2 = to.y + nodeH / 2;
      const mx = (x1 + x2) / 2;
      edgeSVG += `<path class="dag-edge" d="M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}"/>`;
    }
  });

  let nodeSVG = '';
  activeTasks.forEach(t => {
    const pos = positions[t.id];
    if (!pos) return;
    const colors = statusColors[t.status] || statusColors.pending;
    const label = truncate(t.summary || t.id, 22);
    const p = t.payload?.priority ?? 2;
    nodeSVG += `<g class="dag-node" transform="translate(${pos.x},${pos.y})">
      <rect width="${nodeW}" height="${nodeH}" fill="${colors.fill}" stroke="${colors.stroke}"/>
      <text x="10" y="20" font-size="10" fill="#6b6f7b" font-family="JetBrains Mono">P${p} · ${t.type || 'task'}</text>
      <text x="10" y="36" font-size="11" fill="#d4d4d8">${escapeHtml(label)}</text>
    </g>`;
  });

  container.innerHTML = `<svg class="dag-svg" viewBox="0 0 ${svgW} ${svgH}" width="${svgW}" height="${svgH}">
    <defs>
      <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
        <polygon points="0 0, 8 3, 0 6" fill="#363a45"/>
      </marker>
    </defs>
    ${edgeSVG}
    ${nodeSVG}
  </svg>`;
}

// ── Activity Feed ──
function addActivity(actor, text) {
  const list = document.getElementById('activityList');
  const now = new Date().toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  const actorClass = actor === 'human' ? 'actor-human' : 'actor-agent';
  const actorLabel = actor === 'human' ? 'Human' : 'Agent';

  const item = document.createElement('div');
  item.className = 'activity-item';
  item.innerHTML = `<span class="activity-time">${now}</span><span class="activity-actor ${actorClass}">${actorLabel}</span> ${escapeHtml(text)}`;

  list.insertBefore(item, list.firstChild);

  // Keep max 50
  while (list.children.length > 50) {
    list.removeChild(list.lastChild);
  }
}

// ── Helpers ──
function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function truncate(s, n) {
  if (!s) return '';
  return s.length > n ? s.slice(0, n) + '...' : s;
}

function statusLabel(s) {
  return { pending: 'Pending', in_progress: 'In Progress', completed: 'Completed', abandoned: 'Abandoned' }[s] || s;
}
