ws/claude-desktop-installs-preauthorized-browser-extension-mani-4064fb1a","author":"CGMthrowaway","points":95,"comments":17,"hn":"https://news.ycombinator.com/item?id=47880697","claim":"Claude Desktop app installs an undisclosed native messaging bridge enabling preauthorized browser communication.","novelty":"Incremental finding: documents undisclosed auto-installation pattern in existing Claude product; extends known native-messaging bridge capabilities","so_what":"Agent builders must audit local tool installations for hidden privileged channels. Desktop AI apps now silently extend browser capabilities—affects threat model for sensitive workflows.","tags":["agent","model"],"primary":"agent","color":"#9ab8ff"},{"id":"47879330","date":"2026-04-24","title":"GPT-5.5: Mythos-Like Hacking, Open to All","url":"https://xbow.com/blog/mythos-like-hacking-open-to-all","author":"rs_rs_rs_rs_rs","points":71,"comments":21,"hn":"https://news.ycombinator.com/item?id=47879330","claim":"GPT-5.5 enables mythological reasoning patterns accessible to non-experts through open APIs","novelty":"Incremental: applies existing LLM APIs to narrative/symbolic reasoning; novelty is democratization angle, not technical breakthrough","so_what":"Agents can leverage symbolic reasoning for world-building, planning under ambiguity, and multi-step narratives without custom training or specialized tools","tags":["model","training","reasoning"],"primary":"model","color":"#ffb86b"},{"id":"47889110","date":"2026-04-24","title":"Show HN: Atomic – Local-first, AI-augmented personal knowledge base","url":"https://atomicapp.ai/","author":"kenforthewin","points":33,"comments":14,"hn":"https://news.ycombinator.com/item?id=47889110","claim":"Local-first personal knowledge base with integrated AI augmentation for note-taking and knowledge management.","novelty":"Incremental: combines existing local-first (cf. Obsidian, Logseq) and AI-augmented (cf. Copilot plugins) approaches; differentiator unclear from description alone","so_what":"Enables agents to query user knowledge bases offline while preserving privacy—useful for retrieval-augmented generation (RAG) systems that need persistent, user-controlled context without cloud dependencies","tags":["memory","agent","opinion"],"primary":"memory","color":"#7fd4b8"},{"id":"47890841","date":"2026-04-24","title":"Show HN: Browser Harness – Gives LLM freedom to complete any browser task","url":"https://github.com/browser-use/browser-harness","author":"gregpr07","points":22,"comments":2,"hn":"https://news.ycombinator.com/item?id=47890841","claim":"LLMs can directly use Chrome DevTools Protocol instead of predefined tools to complete browser tasks","novelty":"Incremental: shifts from curated tool sets to direct CDP access. Novel angle: LLM self-correction and tool invention; trades deterministic heuristics for model capability","so_what":"Eliminates fragile edge-case handling (file dialogs, alerts, iframes). Reduces framework maintenance burden. If CDP knowledge generalizes across models, enables more robust agent behavior without constant tool expansion","tags":["agent","opinion"],"primary":"agent","color":"#9ab8ff"},{"id":"47894000","date":"2026-04-25","title":"OpenAI releases GPT-5.5 and GPT-5.5 Pro in the API","url":"https://developers.openai.com/api/docs/changelog","author":"arabicalories","points":251,"comments":148,"hn":"https://news.ycombinator.com/item?id=47894000","claim":"OpenAI releases GPT-5.5 and GPT-5.5 Pro models via API","novelty":"Incremental release following GPT-5; introduces Pro tier variant, likely improved capabilities over predecessor","so_what":"Practitioners can access latest OpenAI models via API for production agents; Pro tier suggests tiered pricing/performance tradeoff requiring cost-benefit analysis for deployment","tags":["model"],"primary":"model","color":"#ffb86b"},{"id":"47899844","date":"2026-04-25","title":"Show HN: A Karpathy-style LLM wiki your agents maintain (Markdown and Git)","url":"https://github.com/nex-crm/wuphf","author":"najmuzzaman","points":177,"comments":88,"hn":"https://news.ycombinator.com/item?id=47899844","claim":"Markdown + Git can serve as a lightweight LLM-native knowledge substrate for agent collaboration.","novelty":"Incremental on Karpathy's persistent knowledge substrate idea; novel in using plain markdown+git instead of Postgres/pgvector/Neo4j, proving a simpler baseline works.","so_what":"Agents can now maintain shared, versioned, locally-cloneable knowledge without heavyweight infrastructure. Fact logs with synthesis workers let teams track entity state changes with full audit trails—critical for multi-agent continuity.","tags":["memory","agent","opinion"],"primary":"memory","color":"#7fd4b8"},{"id":"47897790","date":"2026-04-25","title":"Open source memory layer so any AI agent can do what Claude.ai and ChatGPT do","url":"https://alash3al.github.io/stash?_v01","author":"alash3al","points":139,"comments":58,"hn":"https://news.ycombinator.com/item?id=47897790","claim":"Open-source memory layer enables any AI agent to maintain persistent context like Claude and ChatGPT","novelty":"Incremental—memory/context management exists in LangChain, LlamaIndex; this packages it as standalone reusable layer for agent builders","so_what":"Agents can now remember conversation history and user preferences without rebuilding memory infra. Reduces engineering overhead when adding memory to custom agent frameworks.","tags":["memory","agent","model","infra"],"primary":"memory","color":"#7fd4b8"},{"id":"47895029","date":"2026-04-25","title":"Tell HN: Claude 4.7 is ignoring stop hooks","url":"https://news.ycombinator.com/item?id=47895029","author":"LatencyKills","points":88,"comments":84,"hn":"https://news.ycombinator.com/item?id=47895029","claim":"Claude 4.7 ignores stop hooks that enforce deterministic workflow constraints","novelty":"Incremental regression: hooks worked in prior Claude versions; 4.7 breaks established functionality without documented behavior change","so_what":"Agents relying on Claude's hook system for enforcing guardrails (test runs, code review gates, safety checks) cannot trust model compliance in 4.7, breaking deterministic agentic workflows and forcing fallback to weaker validation","tags":["model"],"primary":"model","color":"#ffb86b"},{"id":"47900506","date":"2026-04-25","title":"Lambda Calculus Benchmark for AI","url":"https://victortaelin.github.io/lambench/","author":"marvinborner","points":81,"comments":29,"hn":"https://news.ycombinator.com/item?id=47900506","claim":"Lambda calculus evaluation benchmarks AI reasoning on pure functional computation without domain-specific optimizations.","novelty":"Incremental: uses established formal systems as eval; novel angle is isolating functional reasoning from memorized patterns in training data","so_what":"Helps identify whether LLM improvements are genuine reasoning vs. pattern matching. Critical for agents needing reliable symbolic manipulation in proof assistants or formal verification.","tags":["training","eval","reasoning"],"primary":"training","color":"#ff79c6"},{"id":"47894690","date":"2026-04-25","title":"Could a Claude Code routine watch my finances?","url":"https://driggsby.com/blog/claude-code-routine-watch-my-finances","author":"mbm","points":79,"comments":120,"hn":"https://news.ycombinator.com/item?id=47894690","claim":"Claude Code routines can autonomously monitor personal finances by analyzing bank data and generating reports.","novelty":"Incremental application of existing Claude API capabilities. Extends routine/automation patterns to personal finance domain; not a novel Claude feature.","so_what":"Shows how agentic AI can reduce manual bookkeeping work by automating recurring financial analysis tasks. Demonstrates practical multi-step autonomy pattern agents can adopt for knowledge work automation.","tags":["agent","model"],"primary":"agent","color":"#9ab8ff"},{"id":"47893620","date":"2026-04-25","title":"CC-Canary: Detect ea const W = window.innerWidth, H = window.innerHeight;
const svg = d3.select('#g').attr('viewBox', [0, 0, W, H]);
const root = svg.append('g');

svg.call(d3.zoom().scaleExtent([0.3, 4]).on('zoom', e => root.attr('transform', e.transform)));

const radius = d => 4 + Math.sqrt(d.points || 1) * 1.2;

const sim = d3.forceSimulation(DATA.nodes)
  .force('link', d3.forceLink(DATA.links).id(d => d.id).distance(d => 80 / (d.weight || 1)).strength(0.3))
  .force('charge', d3.forceManyBody().strength(-180))
  .force('center', d3.forceCenter(W/2, H/2))
  .force('collide', d3.forceCollide().radius(d => radius(d) + 4));

const link = root.append('g').attr('class', 'links').selectAll('line')
  .data(DATA.links).join('line')
  .attr('class', 'link')
  .attr('stroke-width', d => Math.min(d.weight, 4));

const node = root.append('g').attr('class', 'nodes').selectAll('g')
  .data(DATA.nodes).join('g').attr('class', 'node')
  .call(d3.drag()
    .on('start', (e, d) => { if (!e.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
    .on('drag',  (e, d) => { d.fx = e.x; d.fy = e.y; })
    .on('end',   (e, d) => { if (!e.active) sim.alphaTarget(0); d.fx = null; d.fy = null; }));

node.append('circle').attr('r', radius).attr('fill', d => d.color);
node.append('text')
  .attr('dy', d => -radius(d) - 3)
  .attr('text-anchor', 'middle')
  .text(d => d.title.length > 36 ? d.title.slice(0, 34) + '…' : d.title);

node.on('click', (e, d) => {
  e.stopPropagation();
  const adj = new Set([d.id]);
  DATA.links.forEach(l => {
    const s = l.source.id || l.source, t = l.target.id || l.target;
    if (s === d.id) adj.add(t);
    if (t === d.id) adj.add(s);
  });
  node.classed('dim', n => !adj.has(n.id));
  link.classed('dim', l => {
    const s = l.source.id || l.source, t = l.target.id || l.target;
    return !(s === d.id || t === d.id);
  });
  link.classed('hi', l => {
    const s = l.source.id || l.source, t = l.target.id || l.target;
    return s === d.id || t === d.id;
  });

  document.getElementById('p-title').textContent = d.title;
  document.getElementById('p-title').href = d.url;
  document.getElementById('p-pts').textContent = d.points + ' pts';
  document.getElementById('p-author').textContent = 'by ' + d.author;
  document.getElementById('p-date').textContent = d.date;
  document.getElementById('p-hn').href = d.hn;
  document.getElementById('p-claim').textContent = d.claim || '—';
  document.getElementById('p-novelty').textContent = d.novelty || '—';
  document.getElementById('p-so').textContent = d.so_what || '—';
  document.getElementById('p-tags').innerHTML = d.tags.map(t => '<span class="tag">' + t + '</span>').join('');
  document.getElementById('panel').classList.add('show');
});

svg.on('click', () => {
  node.classed('dim', false);
  link.classed('dim', false).classed('hi', false);
});

sim.on('tick', () => {
  link
    .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
    .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
  node.attr('transform', d => 'translate(' + d.x + ',' + d.y + ')');
});

window.addEventListener('resize', () => {
  const w = window.innerWidth, h = window.innerHeight;
  svg.attr('viewBox', [0, 0, w, h]);
  sim.force('center', d3.forceCenter(w/2, h/2)).alpha(0.3).restart();
});
</script>
