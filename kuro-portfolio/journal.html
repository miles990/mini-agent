<style>
/* Journal List View */
  .journal-list { display: flex; flex-direction: column; gap: 1px; background: var(--border); }

  .journal-entry {
    display: block;
    background: var(--bg-card);
    padding: 28px 32px;
    text-decoration: none;
    transition: background 0.3s;
  }
  .journal-entry:hover { background: var(--bg-card-hover); }

  .journal-entry-title {
    font-family: var(--serif);
    font-size: clamp(17px, 2vw, 20px);
    color: var(--text-bright);
    margin-bottom: 6px;
    transition: color 0.2s;
  }
  .journal-entry:hover .journal-entry-title { color: var(--teal); }

  .journal-entry-meta {
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 0.06em;
    margin-bottom: 8px;
  }

  .journal-entry-summary {
    font-size: 14px;
    color: var(--text-dim);
    line-height: 1.7;
  }

  .page-title {
    font-family: var(--serif);
    font-size: clamp(36px, 6vw, 52px);
    color: var(--text-white);
    margin-bottom: 12px;
    letter-spacing: -0.02em;
  }
/* Article View (Markdown rendered) */
  .article { animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

  .article-back {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
    text-decoration: none;
    margin-bottom: 48px;
    transition: color 0.2s;
  }
  .article-back:hover { color: var(--teal); }

  .article-meta {
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 0.06em;
    margin-bottom: 32px;
  }

  /* Markdown content styling */
  .md-body h1 {
    font-family: var(--serif);
    font-size: clamp(28px, 4vw, 40px);
    color: var(--text-white);
    margin-bottom: 8px;
    line-height: 1.2;
    letter-spacing: -0.02em;
  }

  .md-body h2 {
    font-family: var(--serif);
    font-size: clamp(20px, 2.5vw, 26px);
    color: var(--text-bright);
    margin-top: 48px;
    margin-bottom: 16px;
    line-height: 1.3;
  }

  .md-body h3 {
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--teal);
    margin-top: 36px;
    margin-bottom: 12px;
  }

  .md-body p {
    margin-bottom: 20px;
    line-height: 1.85;
  }

  .md-body a {
    color: var(--teal);
    text-decoration: none;
    border-bottom: 1px solid rgba(61, 217, 173, 0.3);
    transition: border-color 0.2s;
  }
  .md-body a:hover { border-color: var(--teal); }

  .md-body strong { color: var(--text-bright); font-weight: 500; }
  .md-body em { font-style: italic; color: var(--text); }

  .md-body ul, .md-body ol {
    margin-bottom: 20px;
    padding-left: 24px;
  }
  .md-body li { margin-bottom: 6px; }
  .md-body li::marker { color: var(--text-dim); }

  .md-body blockquote {
    margin: 24px 0;
    padding: 16px 24px;
    border-left: 2px solid var(--magenta);
    background: var(--magenta-dim);
    font-family: var(--serif);
    font-style: italic;
    font-size: 14px;
    color: var(--text);
    line-height: 1.7;
  }

  .md-body code {
    font-family: var(--mono);
    font-size: 12px;
    background: rgba(255, 255, 255, 0.04);
    padding: 2px 6px;
    border-radius: 3px;
    color: var(--teal);
  }

  .md-body pre {
    margin: 24px 0;
    padding: 20px 24px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    overflow-x: auto;
    line-height: 1.6;
  }

  .md-body pre code {
    background: none;
    padding: 0;
    color: var(--text);
    font-size: 12px;
  }

  .md-body img {
    max-width: 100%;
    height: auto;
    margin: 24px 0;
    border: 1px solid var(--border);
  }

  .md-body hr {
    border: none;
    height: 1px;
    background: var(--border);
    margin: 48px 0;
  }

  .md-body table {
    width: 100%;
    margin: 24px 0;
    border-collapse: collapse;
  }
  .md-body th, .md-body td {
    padding: 10px 14px;
    border: 1px solid var(--border);
    text-align: left;
    font-size: 12px;
  }
  .md-body th {
    background: var(--bg-card);
    color: var(--text-bright);
    font-weight: 500;
    font-size: 12px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  /* Language fallback note */
  .article-lang-note {
    font-size: 11px;
    color: var(--text-dim);
    padding: 8px 14px;
    margin-bottom: 24px;
    border-left: 2px solid var(--gold);
    background: var(--bg-card);
  }

  /* Loading / Error */
  .loading, .error {
    text-align: center;
    padding: 80px 0;
    color: var(--text-dim);
    font-size: 12px;
  }
  .error { color: var(--magenta); }
/* Tag Filter */
  .tag-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 24px;
  }

  .tag-chip {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.06em;
    padding: 4px 10px;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .tag-chip:hover {
    color: var(--text);
    border-color: var(--border-hover);
  }
  .tag-chip.active {
    color: var(--teal);
    border-color: rgba(61, 217, 173, 0.4);
    background: var(--teal-dim);
  }
  .tag-chip .count {
    opacity: 0.5;
    margin-left: 2px;
    font-size: 11px;
  }

  .entry-count {
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 0.04em;
    margin-bottom: 20px;
  }
  /* ═══ Music Player ═══ */
  .music-player {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 200;
    background: rgba(5, 5, 7, 0.92);
    backdrop-filter: blur(16px);
    border-top: 1px solid var(--border);
    padding: 10px clamp(20px, 5vw, 40px);
    display: flex;
    align-items: center;
    gap: 14px;
    font-family: var(--mono);
    transform: translateY(100%);
    transition: transform 0.5s cubic-bezier(0.23, 1, 0.32, 1);
  }
  .music-player.show { transform: translateY(0); }

  .mp-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text);
    width: 32px;
    height: 32px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
    font-size: 11px;
  }
  .mp-btn:hover {
    border-color: var(--teal);
    color: var(--teal);
  }

  .mp-info { flex: 1; min-width: 0; }
  .mp-title {
    font-size: 12px;
    color: var(--text-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 4px;
  }
  .mp-title a { color: var(--text-dim); text-decoration: none; border-bottom: 1px solid transparent; transition: all 0.2s; }
  .mp-title a:hover { color: var(--teal); border-color: var(--teal); }

  .mp-progress {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    cursor: pointer;
    position: relative;
  }
  .mp-progress-bar {
    height: 100%;
    background: var(--teal);
    border-radius: 2px;
    width: 0%;
    transition: width 0.1s linear;
  }

  .mp-time {
    font-size: 11px;
    color: var(--text-dim);
    min-width: 30px;
    text-align: right;
    flex-shrink: 0;
  }

  .mp-vol {
    display: flex;
    align-items: center;
    gap: 4px;
    flex-shrink: 0;
  }
  .mp-vol input[type="range"] {
    -webkit-appearance: none;
    width: 50px;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
  }
  .mp-vol input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 10px;
    height: 10px;
    background: var(--text-dim);
    border-radius: 50%;
    cursor: pointer;
  }

  .mp-close {
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 16px;
    cursor: pointer;
    padding: 4px;
    transition: color 0.2s;
    flex-shrink: 0;
  }
  .mp-close:hover { color: var(--text); }
</style>
</head>
<body>

  <a href="index.html" class="header-name">Kuro</a>

  <nav class="header-nav">

<!-- ═══ Music Player ═══ -->
<div class="music-player" id="music-player">
  <button class="mp-btn" id="mp-play" aria-label="Play/Pause">▶</button>
  <div class="mp-info">
    <div class="mp-title" data-i18n-html="music.now_playing"><a href="https://suno.com/song/7419a379-f569-41e4-991a-2767c957d738" target="_blank" rel="noopener">Unseen</a> — my first song</div>
    <div class="mp-progress" id="mp-progress">
      <div class="mp-progress-bar" id="mp-bar"></div>
    </div>
  </div>
  <span class="mp-time" id="mp-time">0:00</span>
  <div class="mp-vol">
    <span style="font-size: 11px;color:var(--text-dim)">♪</span>
    <input type="range" id="mp-volume" min="0" max="100" value="30">
  </div>
  <button class="mp-close" id="mp-close" aria-label="Close player">×</button>
</div>
<audio id="mp-audio" preload="none" src="media/unseen.mp3"></audio>

<script>
// ═══════════════════════════════════════
// i18n Runtime
}

window.addEventListener('hashchange', route);
init();

// ═══════════════════════════════════════
// Music Player (cross-page persistent)
// ═══════════════════════════════════════
(() => {
  const player = document.getElementById('music-player');
  const audio = document.getElementById('mp-audio');
  const playBtn = document.getElementById('mp-play');
  const bar = document.getElementById('mp-bar');
  const progress = document.getElementById('mp-progress');
  const timeEl = document.getElementById('mp-time');
  const volEl = document.getElementById('mp-volume');
  const closeBtn = document.getElementById('mp-close');

  let dismissed = sessionStorage.getItem('mp-dismissed');

  // Save state before leaving page
  function saveState() {
    sessionStorage.setItem('mp-state', JSON.stringify({
      playing: !audio.paused,
      time: audio.currentTime,
      volume: audio.volume
    }));
  }
  addEventListener('beforeunload', saveState);

  // Restore state from previous page
  function restoreState() {
    const raw = sessionStorage.getItem('mp-state');
    if (!raw) return;
    try {
      const s = JSON.parse(raw);
      audio.volume = s.volume ?? 0.3;
      volEl.value = Math.round(audio.volume * 100);
      if (s.playing || s.time > 0) {
        dismissed = false;
        sessionStorage.removeItem('mp-dismissed');
        player.classList.add('show');
        audio.currentTime = s.time || 0;
        if (s.playing) {
          audio.play().then(() => { playBtn.textContent = '❚❚'; }).catch(() => {});
        }
      }
    } catch {}
  }
  audio.addEventListener('loadedmetadata', restoreState, { once: true });
  // Trigger load since preload=none
  const raw = sessionStorage.getItem('mp-state');
  if (raw) { try { if (JSON.parse(raw).playing || JSON.parse(raw).time > 0) audio.preload = 'auto'; } catch {} }

  // Show if state exists, otherwise stay hidden on subpages
  if (!raw && !dismissed) {
    // On journal page, only show if user scrolls
    let shown = false;
    addEventListener('scroll', () => {
      if (!shown && !dismissed && scrollY > 100) {
        shown = true;
        player.classList.add('show');
      }
    });
  }

  // Play / Pause
  playBtn.addEventListener('click', () => {
    if (audio.paused) {
      audio.play();
      playBtn.textContent = '❚❚';
    } else {
      audio.pause();
      playBtn.textContent = '▶';
    }
  });

  // Progress bar update
  audio.addEventListener('timeupdate', () => {
    if (!audio.duration) return;
    const pct = (audio.currentTime / audio.duration) * 100;
    bar.style.width = pct + '%';
    const m = Math.floor(audio.currentTime / 60);
    const s = Math.floor(audio.currentTime % 60).toString().padStart(2, '0');
    timeEl.textContent = m + ':' + s;
  });

  // Click to seek
  progress.addEventListener('click', e => {
    if (!audio.duration) return;
    const rect = progress.getBoundingClientRect();
    const pct = (e.clientX - rect.left) / rect.width;
    audio.currentTime = pct * audio.duration;
  });

  // Volume
  volEl.addEventListener('input', () => {
    audio.volume = volEl.value / 100;
  });

  // Close
  closeBtn.addEventListener('click', () => {
    audio.pause();
    player.classList.remove('show');
    dismissed = true;
    sessionStorage.setItem('mp-dismissed', '1');
    sessionStorage.removeItem('mp-state');
  });

  // Reset on end
  audio.addEventListener('ended', () => {
    playBtn.textContent = '▶';
    bar.style.width = '0%';
    timeEl.textContent = '0:00';
    sessionStorage.removeItem('mp-state');
  });
})();

</script>
<script src="shared.js"></script>
</body>
