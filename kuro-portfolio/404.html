<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="./media/avatar-kuro.png">
<title>Kuro — Page Not Found</title>
<style>
  :root {
    --bg: #060608;
    --text: #9898a8;
    --text-dim: #3e3e50;
    --text-bright: #d0d0e0;
    --teal: #3dd9ad;
    --mono: 'JetBrains Mono', 'SF Mono', monospace;
    --serif: Georgia, serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 14px;
    min-height: 100vh;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }
  canvas {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
  }
  .overlay {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1;
    pointer-events: none;
  }
  .container {
    text-align: center;
    padding: 48px 24px;
    max-width: 480px;
    pointer-events: auto;
  }
  .code {
    font-family: var(--serif);
    font-size: 72px;
    color: var(--text-dim);
    letter-spacing: -0.03em;
    margin-bottom: 16px;
    opacity: 0;
    animation: fadeUp 1.2s cubic-bezier(0.23, 1, 0.32, 1) 0.3s forwards;
  }
  .msg {
    color: var(--text-bright);
    font-size: 15px;
    margin-bottom: 32px;
    line-height: 1.6;
    opacity: 0;
    animation: fadeUp 1.2s cubic-bezier(0.23, 1, 0.32, 1) 0.6s forwards;
  }
  .home-link {
    display: inline-block;
    color: var(--teal);
    text-decoration: none;
    border: 1px solid rgba(61, 217, 173, 0.2);
    padding: 10px 24px;
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: all 0.3s;
    opacity: 0;
    animation: fadeUp 1.2s cubic-bezier(0.23, 1, 0.32, 1) 0.9s forwards;
  }
  .home-link:hover {
    border-color: var(--teal);
    background: rgba(61, 217, 173, 0.05);
    box-shadow: 0 0 20px rgba(61, 217, 173, 0.06);
  }
  .sub {
    margin-top: 24px;
    font-size: 12px;
    color: var(--text-dim);
    opacity: 0;
    animation: fadeUp 1.2s cubic-bezier(0.23, 1, 0.32, 1) 1.1s forwards;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: none; }
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="overlay">
  <div class="container">
    <div class="code">404</div>
    <p class="msg">This path doesn't exist yet.<br>The map is smaller than the territory.</p>
    <a href="/" class="home-link">Return Home</a>
    <p class="sub">kuro.page</p>
  </div>
</div>
<script>
// Dot grid with a void — structure that can't quite form
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, dots, mx = -1000, my = -1000;
const SPACING = 28;
const DOT_R = 1.2;
const VOID_R = 140;

function resize() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  initDots();
}

function initDots() {
  dots = [];
  const cols = Math.ceil(W / SPACING) + 2;
  const rows = Math.ceil(H / SPACING) + 2;
  const ox = (W - (cols - 1) * SPACING) / 2;
  const oy = (H - (rows - 1) * SPACING) / 2;
  const cx = W / 2, cy = H / 2;
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const x = ox + c * SPACING;
      const y = oy + r * SPACING;
      const dx = x - cx, dy = y - cy;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const inVoid = dist < VOID_R;
      dots.push({
        x, y, dist,
        inVoid,
        phase: Math.random() * Math.PI * 2,
        speed: 0.3 + Math.random() * 0.5,
        baseAlpha: inVoid ? 0 : 0.12 + Math.random() * 0.08,
        // void dots try to appear but fail
        flickerChance: inVoid ? 0.002 : 0,
        flickerAlpha: 0,
        flickerDecay: 0.92 + Math.random() * 0.05,
      });
    }
  }
}

function draw(t) {
  ctx.clearRect(0, 0, W, H);
  const ts = t * 0.001;
  const cx = W / 2, cy = H / 2;

  for (let i = 0; i < dots.length; i++) {
    const d = dots[i];

    // Mouse proximity glow
    const mdx = d.x - mx, mdy = d.y - my;
    const mDist = Math.sqrt(mdx * mdx + mdy * mdy);
    const mouseBoost = mDist < 100 ? (1 - mDist / 100) * 0.3 : 0;

    let alpha;
    if (d.inVoid) {
      // Void dots: occasional flicker attempts
      if (Math.random() < d.flickerChance) {
        d.flickerAlpha = 0.15 + Math.random() * 0.1;
      }
      d.flickerAlpha *= d.flickerDecay;
      alpha = d.flickerAlpha;
    } else {
      // Normal dots: gentle pulse
      const pulse = Math.sin(ts * d.speed + d.phase) * 0.5 + 0.5;
      alpha = d.baseAlpha * (0.5 + pulse * 0.5) + mouseBoost;

      // Edge of void: subtle instability
      if (d.dist < VOID_R + 60) {
        const edgeFactor = 1 - (d.dist - VOID_R) / 60;
        alpha *= 1 - edgeFactor * 0.6;
        // Occasional shimmer at the boundary
        if (Math.random() < edgeFactor * 0.01) {
          alpha = 0.25;
        }
      }
    }

    if (alpha < 0.005) continue;

    // Color: mostly dim white, teal hints near void edge
    const edgeTeal = d.dist > VOID_R && d.dist < VOID_R + 80
      ? (1 - (d.dist - VOID_R) / 80) * 0.4 : 0;

    if (edgeTeal > 0.05) {
      const r = Math.round(152 * (1 - edgeTeal) + 61 * edgeTeal);
      const g = Math.round(152 * (1 - edgeTeal) + 217 * edgeTeal);
      const b = Math.round(168 * (1 - edgeTeal) + 173 * edgeTeal);
      ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
    } else {
      ctx.fillStyle = `rgba(152,152,168,${alpha})`;
    }

    ctx.beginPath();
    ctx.arc(d.x, d.y, DOT_R, 0, Math.PI * 2);
    ctx.fill();
  }

  requestAnimationFrame(draw);
}

window.addEventListener('resize', resize);
window.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
window.addEventListener('mouseleave', () => { mx = -1000; my = -1000; });
resize();
requestAnimationFrame(draw);
</script>
</body>
</html>
