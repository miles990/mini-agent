<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Team Room</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=DM+Sans:wght@400;500;600&display=swap');

  :root {
    --bg: #08090c;
    --bg-elevated: #0e1017;
    --bg-input: #12141c;
    --border: #1a1d2a;
    --border-focus: #2a2f42;
    --fg: #c8cdd8;
    --fg-dim: #5a6070;
    --fg-muted: #3a3f50;
    --alex: #f0a030;
    --alex-bg: rgba(240, 160, 48, 0.06);
    --kuro: #40e8a0;
    --kuro-bg: rgba(64, 232, 160, 0.06);
    --claude: #60a0f0;
    --claude-bg: rgba(96, 160, 240, 0.06);
    --system: #7868b0;
    --scrollbar: #1a1d2a;
    --scrollbar-hover: #2a2f42;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    overflow: hidden;
  }

  body {
    font-family: 'DM Sans', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    flex-direction: column;
  }

  /* === Scanline overlay === */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0, 0, 0, 0.03) 2px,
      rgba(0, 0, 0, 0.03) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  /* === Header === */
  .header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--bg-elevated);
    flex-shrink: 0;
  }

  .header-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    color: var(--fg);
  }

  .header-title span { color: var(--fg-dim); }

  .conn-indicator {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--fg-muted);
    transition: background 0.5s;
    flex-shrink: 0;
  }
  .conn-indicator.connected { background: var(--kuro); box-shadow: 0 0 6px rgba(64, 232, 160, 0.4); }
  .conn-indicator.error { background: #e04050; box-shadow: 0 0 6px rgba(224, 64, 80, 0.4); }

  .conn-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    color: var(--fg-dim);
  }

  .header-spacer { flex: 1; }

  .header-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    color: var(--fg-dim);
    background: none;
    border: 1px solid var(--border);
    padding: 4px 10px;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .header-btn:hover { color: var(--fg); border-color: var(--border-focus); }

  /* === Setup Panel === */
  .setup {
    padding: 20px;
    background: var(--bg-elevated);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .setup-grid {
    display: grid;
    grid-template-columns: 1fr 1fr auto;
    gap: 10px;
    align-items: end;
  }

  .setup label {
    display: block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    color: var(--fg-dim);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 5px;
  }

  .setup input {
    width: 100%;
    padding: 8px 10px;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--fg);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .setup input:focus { border-color: var(--border-focus); }

  .setup button {
    padding: 8px 18px;
    background: transparent;
    color: var(--kuro);
    border: 1px solid var(--kuro);
    border-radius: 3px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.04em;
  }
  .setup button:hover { background: rgba(64, 232, 160, 0.1); }

  /* === Messages === */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .messages::-webkit-scrollbar { width: 5px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 3px; }
  .messages::-webkit-scrollbar-thumb:hover { background: var(--scrollbar-hover); }

  .msg {
    padding: 8px 14px;
    border-radius: 4px;
    animation: msgIn 0.25s ease-out;
    max-width: 100%;
  }

  @keyframes msgIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.alex { background: var(--alex-bg); border-left: 2px solid var(--alex); }
  .msg.kuro { background: var(--kuro-bg); border-left: 2px solid var(--kuro); }
  .msg.claude-code { background: var(--claude-bg); border-left: 2px solid var(--claude); }

  .msg-header {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 3px;
  }

  .msg-sender {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.04em;
  }
  .msg.alex .msg-sender { color: var(--alex); }
  .msg.kuro .msg-sender { color: var(--kuro); }
  .msg.claude-code .msg-sender { color: var(--claude); }

  .msg-time {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.62rem;
    color: var(--fg-muted);
  }

  .msg-text {
    font-size: 0.88rem;
    line-height: 1.55;
    color: var(--fg);
    word-break: break-word;
    white-space: pre-wrap;
  }

  .msg-text .mention {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 500;
    font-size: 0.82rem;
  }
  .mention.kuro { color: var(--kuro); }
  .mention.alex { color: var(--alex); }
  .mention.claude { color: var(--claude); }

  /* Thinking indicator */
  .thinking {
    padding: 8px 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    animation: msgIn 0.25s ease-out;
  }

  .thinking-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    color: var(--kuro);
    opacity: 0.7;
  }

  .thinking-dots {
    display: flex;
    gap: 3px;
  }

  .thinking-dots span {
    width: 4px; height: 4px;
    background: var(--kuro);
    border-radius: 50%;
    opacity: 0.4;
    animation: pulse 1.2s ease-in-out infinite;
  }
  .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
  .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes pulse {
    0%, 100% { opacity: 0.2; transform: scale(0.8); }
    50% { opacity: 0.8; transform: scale(1.2); }
  }

  /* System messages */
  .sys-msg {
    text-align: center;
    padding: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    color: var(--fg-muted);
    letter-spacing: 0.04em;
  }

  .day-divider {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 0;
    color: var(--fg-muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.06em;
  }
  .day-divider::before, .day-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Empty state */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    color: var(--fg-muted);
  }

  .empty-state-icon {
    font-size: 2rem;
    opacity: 0.3;
  }

  .empty-state-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.04em;
  }

  /* === Input Area === */
  .input-area {
    border-top: 1px solid var(--border);
    background: var(--bg-elevated);
    padding: 14px 20px;
    display: flex;
    gap: 10px;
    align-items: flex-end;
    flex-shrink: 0;
  }

  .identity-select {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    background: var(--bg-input);
    border: 1px solid var(--border);
    color: var(--fg);
    padding: 8px 6px;
    border-radius: 3px;
    outline: none;
    cursor: pointer;
    flex-shrink: 0;
  }

  .input-wrap {
    flex: 1;
    position: relative;
  }

  .input-wrap textarea {
    width: 100%;
    padding: 8px 12px;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--fg);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    line-height: 1.4;
    outline: none;
    resize: none;
    min-height: 38px;
    max-height: 120px;
    transition: border-color 0.2s;
  }
  .input-wrap textarea:focus { border-color: var(--border-focus); }
  .input-wrap textarea::placeholder { color: var(--fg-muted); }

  .send-btn {
    padding: 8px 16px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--fg-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    cursor: pointer;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .send-btn:hover { color: var(--fg); border-color: var(--border-focus); }
  .send-btn:active { transform: scale(0.97); }
  .send-btn.ready { color: var(--kuro); border-color: var(--kuro); }

  /* === Reply UI === */
  .msg { position: relative; }

  .msg .reply-btn {
    position: absolute;
    top: 6px;
    right: 8px;
    background: none;
    border: none;
    color: var(--fg-muted);
    font-size: 0.72rem;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.15s;
    font-family: 'JetBrains Mono', monospace;
    padding: 2px 5px;
    border-radius: 2px;
  }
  .msg:hover .reply-btn { opacity: 1; }
  .msg .reply-btn:hover { color: var(--fg-dim); background: rgba(255,255,255,0.05); }

  .msg-quote {
    font-size: 0.75rem;
    color: var(--fg-dim);
    border-left: 2px solid var(--fg-muted);
    padding: 2px 8px;
    margin-bottom: 4px;
    opacity: 0.7;
    cursor: pointer;
    max-height: 2.4em;
    overflow: hidden;
    font-family: 'JetBrains Mono', monospace;
  }
  .msg-quote:hover { opacity: 1; }

  .msg-id {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.58rem;
    color: var(--fg-muted);
    opacity: 0.45;
    transition: opacity 0.15s;
    margin-left: 4px;
    cursor: pointer;
    user-select: none;
  }
  .msg:hover .msg-id { opacity: 0.9; }
  .msg-id:hover { color: var(--fg-dim) !important; }

  /* === Topic Badge === */
  .topic-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 1px 6px;
    border-radius: 8px;
    opacity: 0.8;
    cursor: pointer;
    color: #333;
    margin-left: 6px;
    flex-shrink: 0;
    transition: opacity 0.15s;
    user-select: none;
  }
  .topic-badge:hover { opacity: 1; }

  /* === Topic Filter Bar === */
  .topic-filter-bar {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 20px;
    background: var(--bg-elevated);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    flex-wrap: wrap;
    min-height: 32px;
  }
  .topic-filter-bar.empty { display: none; }

  .topic-chip {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6rem;
    padding: 2px 8px;
    border-radius: 10px;
    cursor: pointer;
    border: 1px solid var(--border);
    color: var(--fg-dim);
    background: transparent;
    transition: all 0.15s;
    user-select: none;
    letter-spacing: 0.02em;
  }
  .topic-chip:hover { border-color: var(--border-focus); color: var(--fg); }
  .topic-chip.active {
    background: rgba(255, 255, 255, 0.06);
    color: var(--fg);
    border-color: var(--fg-dim);
  }

  /* === Thread Line === */
  .msg.has-thread {
    position: relative;
    margin-left: 8px;
  }
  .msg.has-thread::before {
    content: '';
    position: absolute;
    left: -8px;
    top: 0;
    bottom: 0;
    width: 2px;
    border-radius: 1px;
    opacity: 0.5;
    transition: opacity 0.15s;
  }
  .msg.has-thread:hover::before { opacity: 0.9; }
  .msg.alex.has-thread::before { background: var(--alex); }
  .msg.kuro.has-thread::before { background: var(--kuro); }
  .msg.claude-code.has-thread::before { background: var(--claude); }

  /* Thread highlight on hover */
  .msg.thread-highlight {
    outline: 1px solid rgba(200, 205, 216, 0.1);
    border-radius: 4px;
  }

  /* Topic filter: hidden messages */
  .msg.topic-hidden { display: none; }

  /* === Cluster Collapse === */
  .cluster-summary {
    padding: 6px 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem;
    color: var(--fg-dim);
    cursor: pointer;
    border-left: 2px solid var(--fg-muted);
    margin-left: 8px;
    opacity: 0.7;
    transition: opacity 0.15s;
    user-select: none;
  }
  .cluster-summary:hover { opacity: 1; color: var(--fg); }
  .msg.cluster-collapsed { display: none; }

  /* Inline message ID link (referenced in text) */
  .msg-ref {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.82em;
    color: var(--fg-dim);
    cursor: pointer;
    border-bottom: 1px dashed var(--fg-muted);
    transition: color 0.15s, border-color 0.15s;
  }
  .msg-ref:hover { color: var(--fg); border-color: var(--fg-dim); }

  .chat-photo {
    max-width: min(300px, 100%);
    border-radius: 8px;
    margin: 4px 0;
    cursor: pointer;
    display: block;
  }
  .chat-link {
    color: var(--claude);
    text-decoration: underline;
    word-break: break-all;
  }

  .reply-indicator {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 12px;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-bottom: none;
    border-radius: 3px 3px 0 0;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    color: var(--fg-dim);
  }
  .reply-indicator .reply-text { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .reply-indicator .reply-cancel {
    background: none;
    border: none;
    color: var(--fg-muted);
    cursor: pointer;
    font-size: 0.8rem;
    padding: 0 4px;
  }
  .reply-indicator .reply-cancel:hover { color: var(--fg); }

  .hidden { display: none !important; }

  /* Mobile adjustments */
  @media (max-width: 600px) {
    .setup-grid { grid-template-columns: 1fr; }
    .header-title { font-size: 0.78rem; }
    .messages { padding: 12px 14px; }
    .input-area { padding: 10px 14px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="conn-indicator" id="connDot"></div>
  <span class="conn-label" id="connLabel">offline</span>
  <div class="header-spacer"></div>
  <span class="header-title">TEAM <span>ROOM</span></span>
  <div class="header-spacer"></div>
  <button class="header-btn" id="setupToggle" onclick="toggleSetup()">config</button>
</div>

<div class="setup hidden" id="setupPanel">
  <div class="setup-grid">
    <div>
      <label>Server URL</label>
      <input id="serverUrl" type="url" placeholder="http://localhost:3001" />
    </div>
    <div>
      <label>API Key</label>
      <input id="apiKey" type="password" placeholder="MINI_AGENT_API_KEY" />
    </div>
    <button onclick="connect()">Connect</button>
  </div>
</div>

<div class="topic-filter-bar empty" id="topic-filter">
  <span class="topic-chip active" data-topic="all" onclick="filterByTopic('all')">All</span>
</div>

<div class="messages" id="messages">
  <div class="empty-state" id="emptyState">
    <div class="empty-state-icon">&gt;_</div>
    <div class="empty-state-text">no messages yet</div>
  </div>
</div>

<div class="reply-indicator hidden" id="replyIndicator">
  <span>↩</span>
  <span class="reply-text" id="replyText"></span>
  <button class="reply-cancel" onclick="cancelReply()">✕</button>
</div>
<div class="input-area">
  <select class="identity-select" id="identity">
    <option value="alex">alex</option>
    <option value="claude-code">claude</option>
    <option value="kuro">kuro</option>
  </select>
  <div class="input-wrap">
    <textarea id="msgInput" rows="1" placeholder="Type a message..." disabled></textarea>
  </div>
  <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>send</button>
</div>

<script>
(function() {
  // === State ===
  let baseUrl = '';
  let apiKey = '';
  let eventSource = null;
  let connected = false;
  let thinking = false;
  let replyingTo = null;  // { id, from, text }
  const seenTs = new Set();
  const messagesById = new Map();  // id → { from, text, ts }

  // === DOM ===
  const $messages = document.getElementById('messages');
  const $input = document.getElementById('msgInput');
  const $sendBtn = document.getElementById('sendBtn');
  const $connDot = document.getElementById('connDot');
  const $connLabel = document.getElementById('connLabel');
  const $emptyState = document.getElementById('emptyState');
  const $setupPanel = document.getElementById('setupPanel');
  const $setupToggle = document.getElementById('setupToggle');
  const $replyIndicator = document.getElementById('replyIndicator');
  const $replyText = document.getElementById('replyText');

  // === Init ===
  const saved = localStorage.getItem('chat-room-config');
  if (saved) {
    try {
      const cfg = JSON.parse(saved);
      document.getElementById('serverUrl').value = cfg.url || '';
      document.getElementById('apiKey').value = cfg.key || '';
      if (cfg.url && cfg.key) {
        setTimeout(() => connect(), 100);
      } else {
        $setupPanel.classList.remove('hidden');
      }
    } catch { $setupPanel.classList.remove('hidden'); }
  } else {
    $setupPanel.classList.remove('hidden');
  }

  // Auto-resize textarea
  $input.addEventListener('input', () => {
    $input.style.height = 'auto';
    $input.style.height = Math.min($input.scrollHeight, 120) + 'px';
    $sendBtn.classList.toggle('ready', $input.value.trim().length > 0);
  });

  // Enter to send, Shift+Enter for newline
  // Skip if IME is composing (e.g. selecting Chinese characters)
  $input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey && !e.isComposing) {
      e.preventDefault();
      sendMessage();
    }
  });

  // === Functions ===
  window.toggleSetup = function() {
    $setupPanel.classList.toggle('hidden');
    $setupToggle.textContent = $setupPanel.classList.contains('hidden') ? 'config' : 'close';
  };

  window.connect = function() {
    baseUrl = document.getElementById('serverUrl').value.replace(/\/$/, '');
    apiKey = document.getElementById('apiKey').value;

    if (!baseUrl || !apiKey) return;

    localStorage.setItem('chat-room-config', JSON.stringify({ url: baseUrl, key: apiKey }));
    $setupPanel.classList.add('hidden');
    $setupToggle.textContent = 'config';

    loadHistory();
    connectSSE();

    $input.disabled = false;
    $sendBtn.disabled = false;
    $input.focus();
  };

  function setConnState(state) {
    connected = state === 'connected';
    $connDot.className = 'conn-indicator ' + state;
    $connLabel.textContent = state;
  }

  async function loadHistory() {
    try {
      const res = await fetch(`${baseUrl}/api/room`, {
        headers: { 'x-api-key': apiKey }
      });
      if (!res.ok) throw new Error(res.status);
      const data = await res.json();
      $emptyState?.remove();
      if (data.messages && data.messages.length > 0) {
        data.messages.forEach(m => addMessage(m, false));
        scrollBottom();
      }
    } catch (err) {
      addSystemMsg('Failed to load history: ' + err.message);
    }
  }

  let hadSSEError = false;

  function connectSSE() {
    if (eventSource) {
      eventSource.close();
      eventSource = null;
    }

    const url = `${baseUrl}/api/room/stream${apiKey ? '?key=' + encodeURIComponent(apiKey) : ''}`;
    eventSource = new EventSource(url);

    eventSource.onopen = () => {
      setConnState('connected');
      // Reload history on reconnect to fill gap from missed SSE events
      if (hadSSEError) {
        hadSSEError = false;
        loadHistory();
      }
    };

    const messageEventType = 'action:room';
    const thinkingEventTypes = new Set(['trigger:room', 'trigger:chat']);

    eventSource.onmessage = (ev) => {
      try {
        const payload = JSON.parse(ev.data);
        if (payload.type === messageEventType) {
          removeThinking();
          addMessage(payload.data, true);
        } else if (thinkingEventTypes.has(payload.type)) {
          showThinking();
        }
      } catch {}
    };

    eventSource.onerror = () => {
      hadSSEError = true;
      setConnState('error');
      // Auto-reconnect is built into EventSource
    };
  }

  function addMessage(msg, animate) {
    if (!msg || !msg.from || !msg.text) return;

    // Deduplicate: prefer msg.id, fallback to from:ts:text
    const key = msg.id || `${msg.from}:${msg.ts}:${msg.text.slice(0, 50)}`;
    if (seenTs.has(key)) return;
    seenTs.add(key);

    // Track message by ID for reply lookups
    if (msg.id) messagesById.set(msg.id, { from: msg.from, text: msg.text, ts: msg.ts });

    $emptyState?.remove();

    const el = document.createElement('div');
    el.className = `msg ${msg.from}`;
    if (msg.id) el.setAttribute('data-msg-id', msg.id);
    if (msg.replyTo) el.setAttribute('data-reply-to', msg.replyTo);
    if (!animate) el.style.animation = 'none';

    // Thread line: add class for messages with replyTo
    if (msg.replyTo) el.classList.add('has-thread');

    // Topic detection
    const topic = msg.context?.topic;
    if (topic) {
      el.dataset.topic = topic;
      updateTopicFilter(topic);
    }

    // Cluster from preprocessor
    const cluster = msg.context?.cluster;
    if (cluster) el.dataset.cluster = cluster;

    // Apply active filter
    if (activeFilter !== 'all' && topic !== activeFilter) {
      el.classList.add('topic-hidden');
    }

    const time = msg.ts ? new Date(msg.ts).toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' }) : '';
    const displayName = msg.from === 'claude-code' ? 'claude-code' : msg.from;

    // Build inline quote for replies
    let quoteHtml = '';
    if (msg.replyTo) {
      const parent = messagesById.get(msg.replyTo);
      if (parent) {
        quoteHtml = `<div class="msg-quote" onclick="scrollToMsg('${esc(msg.replyTo)}')">${esc(parent.from)}: ${esc(parent.text.slice(0, 100))}</div>`;
      } else {
        quoteHtml = `<div class="msg-quote">↩ ${esc(msg.replyTo)}</div>`;
      }
    }

    // Build ID badge (short form: #NNN)
    const shortId = msg.id ? '#' + msg.id.replace(/^\d{4}-\d{2}-\d{2}-/, '') : '';
    const idHtml = msg.id
      ? `<span class="msg-id" onclick="scrollToMsg('${esc(msg.id)}')" title="${esc(msg.id)}">${esc(shortId)}</span>`
      : '';

    // Topic badge
    let topicBadgeHtml = '';
    if (topic) {
      const color = topicColor(topic);
      topicBadgeHtml = `<span class="topic-badge" style="background:${color};color:${topicTextColor(color)}" onclick="filterByTopic('${esc(topic)}')">${esc(topic)}</span>`;
    }

    // Reply button
    const replyBtnHtml = msg.id
      ? `<button class="reply-btn" onclick="setReply('${esc(msg.id)}')">↩</button>`
      : '';

    el.innerHTML = `
      ${replyBtnHtml}
      ${quoteHtml}
      <div class="msg-header">
        <span class="msg-sender">${esc(displayName)}</span>
        <span class="msg-time">${esc(time)}</span>
        ${idHtml}
        ${topicBadgeHtml}
      </div>
      <div class="msg-text">${formatText(msg.text)}</div>
    `;

    // Thread hover highlighting
    setupThreadHover(el, msg.id, msg.replyTo);

    $messages.appendChild(el);
    if (animate || isNearBottom()) scrollBottom();
  }

  function addSystemMsg(text) {
    const el = document.createElement('div');
    el.className = 'sys-msg';
    el.textContent = text;
    $messages.appendChild(el);
  }

  function showThinking() {
    if (thinking) return;
    thinking = true;
    const el = document.createElement('div');
    el.className = 'thinking';
    el.id = 'thinkingIndicator';
    el.innerHTML = `
      <span class="thinking-label">kuro</span>
      <div class="thinking-dots"><span></span><span></span><span></span></div>
    `;
    $messages.appendChild(el);
    scrollBottom();
  }

  function removeThinking() {
    thinking = false;
    document.getElementById('thinkingIndicator')?.remove();
  }

  window.sendMessage = async function() {
    const text = $input.value.trim();
    if (!text || !connected) return;

    const from = document.getElementById('identity').value;
    const body = { from, text };
    if (replyingTo) body.replyTo = replyingTo.id;

    $input.value = '';
    $input.style.height = 'auto';
    $sendBtn.classList.remove('ready');
    cancelReply();

    try {
      const res = await fetch(`${baseUrl}/api/room`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
        },
        body: JSON.stringify(body),
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        addSystemMsg('Send failed: ' + (err.error || res.status));
      }
    } catch (err) {
      addSystemMsg('Send failed: ' + err.message);
    }

    $input.focus();
  };

  window.setReply = function(msgId) {
    const msg = messagesById.get(msgId);
    if (!msg) return;
    replyingTo = { id: msgId, from: msg.from, text: msg.text };
    $replyText.textContent = `${msg.from}: ${msg.text.slice(0, 80)}`;
    $replyIndicator.classList.remove('hidden');
    $input.focus();
  };

  window.cancelReply = function() {
    replyingTo = null;
    $replyIndicator.classList.add('hidden');
    $replyText.textContent = '';
  };

  window.scrollToMsg = function(msgId) {
    const el = document.querySelector(`[data-msg-id="${msgId}"]`);
    if (el) {
      el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      el.style.transition = 'outline 0s, box-shadow 0s';
      el.style.outline = '1px solid var(--fg-dim)';
      el.style.boxShadow = '0 0 0 3px rgba(200,205,216,0.08)';
      setTimeout(() => {
        el.style.transition = 'outline 0.8s, box-shadow 0.8s';
        el.style.outline = '1px solid transparent';
        el.style.boxShadow = 'none';
        setTimeout(() => { el.style.outline = ''; el.style.boxShadow = ''; el.style.transition = ''; }, 800);
      }, 1200);
    } else {
      // ID 不在本頁（可能是跨天訊息）
      addSystemMsg(`Message ${msgId} not loaded in current view`);
    }
  };

  // Generate consistent color from topic name
  function topicColor(topic) {
    let hash = 0;
    for (let i = 0; i < topic.length; i++) {
      hash = topic.charCodeAt(i) + ((hash << 5) - hash);
    }
    const hue = Math.abs(hash) % 360;
    return `hsl(${hue}, 60%, 85%)`;
  }

  function topicTextColor(color) {
    const m = color.match(/^hsl\((\d+),\s*(\d+)%?,\s*(\d+)%?\)$/);
    if (!m) return '#333';
    const h = Number(m[1]) / 360;
    const s = Number(m[2]) / 100;
    const l = Number(m[3]) / 100;
    const a = s * Math.min(l, 1 - l);
    const f = (n) => {
      const k = (n + h * 12) % 12;
      return l - a * Math.max(-1, Math.min(k - 3, 9 - k, 1));
    };
    const r = f(0);
    const g = f(8);
    const b = f(4);
    const luminance = 0.2126 * r + 0.7152 * g + 0.0722 * b;
    return luminance > 0.65 ? '#1f2430' : '#f2f4f8';
  }

  // Track topics for filter bar
  const topicSet = new Set();
  let activeFilter = 'all';
  const $topicFilter = document.getElementById('topic-filter');

  function updateTopicFilter(topic) {
    if (!topic || topicSet.has(topic)) return;
    topicSet.add(topic);
    $topicFilter.classList.remove('empty');

    const chip = document.createElement('span');
    chip.className = 'topic-chip';
    chip.dataset.topic = topic;
    chip.textContent = topic;
    const color = topicColor(topic);
    chip.style.background = color;
    chip.style.color = topicTextColor(color);
    chip.style.borderColor = 'transparent';
    chip.onclick = () => filterByTopic(topic);
    $topicFilter.appendChild(chip);
  }

  window.filterByTopic = function(topic) {
    activeFilter = topic;
    // Update chip active states
    $topicFilter.querySelectorAll('.topic-chip').forEach(c => {
      c.classList.toggle('active', c.dataset.topic === topic);
    });
    // Filter messages
    $messages.querySelectorAll('.msg').forEach(el => {
      if (topic === 'all') {
        el.classList.remove('topic-hidden');
      } else {
        const msgTopic = el.dataset.topic || '';
        el.classList.toggle('topic-hidden', msgTopic !== topic);
      }
    });
  };

  // Thread hover: highlight all messages in same thread
  function setupThreadHover(el, msgId, replyTo) {
    if (!replyTo && !msgId) return;
    el.addEventListener('mouseenter', () => {
      // Find all messages in this thread chain
      const chain = new Set();
      if (replyTo) chain.add(replyTo);
      if (msgId) chain.add(msgId);
      // Find replies to this message
      $messages.querySelectorAll('.msg[data-reply-to]').forEach(m => {
        if (m.dataset.replyTo === msgId) chain.add(m.dataset.msgId);
      });
      chain.forEach(id => {
        const target = $messages.querySelector(`[data-msg-id="${id}"]`);
        if (target) target.classList.add('thread-highlight');
      });
    });
    el.addEventListener('mouseleave', () => {
      $messages.querySelectorAll('.thread-highlight').forEach(m => {
        m.classList.remove('thread-highlight');
      });
    });
  }

  // === Cluster Collapse ===
  // After all messages are loaded, group consecutive same-cluster messages
  // and allow collapsing them into a summary line
  function buildClusterCollapseUI() {
    const msgs = Array.from($messages.querySelectorAll('.msg[data-cluster]'));
    if (msgs.length === 0) return;

    // Group consecutive same-cluster messages
    const groups = [];
    let current = { cluster: '', els: [] };

    for (const el of msgs) {
      const cluster = el.dataset.cluster;
      if (cluster === current.cluster) {
        current.els.push(el);
      } else {
        if (current.els.length >= 3) groups.push({ ...current });
        current = { cluster, els: [el] };
      }
    }
    if (current.els.length >= 3) groups.push(current);

    // For each group of 3+ messages, add a collapse toggle
    for (const group of groups) {
      const first = group.els[0];
      const topic = first.dataset.topic || 'misc';
      const count = group.els.length;
      const senders = [...new Set(group.els.map(e => {
        const s = e.querySelector('.msg-sender');
        return s ? s.textContent : '';
      }))].join(', ');

      const summary = document.createElement('div');
      summary.className = 'cluster-summary';
      summary.dataset.cluster = group.cluster;
      summary.textContent = `${senders} — ${count} messages about ${topic}`;
      summary.style.display = 'none'; // hidden by default (expanded)

      summary.onclick = () => {
        // Expand: show all messages, hide summary
        group.els.forEach(e => e.classList.remove('cluster-collapsed'));
        summary.style.display = 'none';
      };

      // Insert summary before first message in group
      first.parentNode.insertBefore(summary, first);

      // Add collapse button to first message header
      const collapseBtn = document.createElement('span');
      collapseBtn.className = 'msg-id';
      collapseBtn.textContent = `[−${count - 1}]`;
      collapseBtn.title = 'Collapse cluster';
      collapseBtn.style.cursor = 'pointer';
      collapseBtn.onclick = (e) => {
        e.stopPropagation();
        // Collapse: hide all but first, show summary after first
        group.els.slice(1).forEach(el => el.classList.add('cluster-collapsed'));
        summary.style.display = '';
      };

      const header = first.querySelector('.msg-header');
      if (header) header.appendChild(collapseBtn);
    }
  }

  // Run after history loads — use MutationObserver to detect when messages are done
  let collapseTimeout = null;
  const collapseObserver = new MutationObserver(() => {
    clearTimeout(collapseTimeout);
    collapseTimeout = setTimeout(() => {
      // Remove old cluster UIs before rebuilding
      $messages.querySelectorAll('.cluster-summary').forEach(e => e.remove());
      $messages.querySelectorAll('.msg .msg-header [title="Collapse cluster"]').forEach(e => e.remove());
      $messages.querySelectorAll('.cluster-collapsed').forEach(e => e.classList.remove('cluster-collapsed'));
      buildClusterCollapseUI();
    }, 500);
  });
  collapseObserver.observe($messages, { childList: true });

  // === Helpers ===
  function formatText(text) {
    let html = esc(text);
    // [Photo: media/xxx.jpg] → inline image
    html = html.replace(
      /\[Photo: media\/([\w\-]+\.(?:jpg|jpeg|png|gif|webp))\]/gi,
      '<img class="chat-photo" src="/api/media/$1" alt="photo" loading="lazy" onclick="window.open(this.src)">'
    );
    // URLs → clickable links
    html = html.replace(
      /(https?:\/\/[^\s<>&"']+)/g,
      '<a href="$1" target="_blank" rel="noopener" class="chat-link">$1</a>'
    );
    // @mentions
    html = html.replace(/@kuro/g, '<span class="mention kuro">@kuro</span>');
    html = html.replace(/@alex/g, '<span class="mention alex">@alex</span>');
    html = html.replace(/@claude/g, '<span class="mention claude">@claude</span>');
    // Message ID references: ↩YYYY-MM-DD-NNN or #YYYY-MM-DD-NNN or standalone YYYY-MM-DD-NNN
    // Matches: ↩2026-02-24-107  or  2026-02-24-107  or  #2026-02-24-107
    html = html.replace(
      /(↩)?(\d{4}-\d{2}-\d{2}-\d+)/g,
      (match, arrow, fullId) => {
        const short = '#' + fullId.replace(/^\d{4}-\d{2}-\d{2}-/, '');
        const prefix = arrow || '';
        return `${prefix}<span class="msg-ref" onclick="scrollToMsg('${fullId}')" title="${fullId}">${short}</span>`;
      }
    );
    return html;
  }

  function esc(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function isNearBottom() {
    return $messages.scrollHeight - $messages.scrollTop - $messages.clientHeight < 80;
  }

  function scrollBottom() {
    requestAnimationFrame(() => {
      $messages.scrollTop = $messages.scrollHeight;
    });
  }
})();
</script>
</body>
</html>
